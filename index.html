// ─── MATERIALS AGENT SCREEN ──────────────────────────────────────────────────
const CATEGORY_LABELS = { cable:'⚡ Cable & Containment', containment:'⚡ Cable & Containment', accessories:'🔌 Accessories & Fittings', 'light-fittings':'🔦 Light Fittings', fixings:'🔧 Fixings & Sundries', consumables:'🔧 Fixings & Sundries', protection:'⚡ Consumer Units & Protection', ev:'🚗 EV Charging', outdoor:'🌿 Outdoor', data:'💾 Data & Comms', certification:'📋 Certification', other:'📦 Other' };
const CATEGORY_DISPLAY_ORDER = ['cable','containment','accessories','light-fittings','protection','ev','outdoor','data','fixings','consumables','certification','other'];

function MaterialsScreen() {
  const { state, setState, lookupMaterial } = useApp();
  const [phase, setPhase] = useState('loading'); // loading | editor
  const [loadStep, setLoadStep] = useState(0);
  const [bom, setBom] = useState(state.billOfMaterials?.length ? state.billOfMaterials : []);
  const [error, setError] = useState('');
  const [swapModal, setSwapModal] = useState(null); // { itemId, allSuppliers }
  const [addSearch, setAddSearch] = useState('');
  const [addResults, setAddResults] = useState([]);
  const [collapsedCats, setCollapsedCats] = useState({});

  const LOAD_STEPS = [
    'Reading the job description...',
    'Identifying materials needed...',
    'Calculating quantities from your scan...',
    'Applying waste factors...',
    'Checking supplier prices...',
    'Done — reviewing your materials list',
  ];

  useEffect(() => {
    if (bom.length > 0) { setPhase('editor'); return; }
    let step = 0;
    const iv = setInterval(() => {
      step++;
      setLoadStep(step);
      if (step >= LOAD_STEPS.length - 1) { clearInterval(iv); callClaude(); }
    }, 800);
    return () => clearInterval(iv);
  }, []);

  const callClaude = async () => {
    const job = state.currentJob;
    const profile = state.profile;
    if (!job) { setPhase('editor'); return; }

    const scan = job.scan || {};
    const dims = scan.dimensions || {};
    const floorArea = dims.length && dims.width ? (dims.length * dims.width).toFixed(2) : '?';
    const wallArea = dims.length && dims.width && dims.height ? (2*(+dims.length + +dims.width) * +dims.height).toFixed(2) : '?';

    const systemPrompt = `You are a materials estimation expert for a UK electrical contractor. Return ONLY valid JSON — an array of materials. Be complete. Include all cables, accessories, fittings, fixings, and consumables. Use UK trade terminology. No labour.`;
    const userPrompt = `TRADE: ${profile?.trade||'electrician'}\nSPECIALISMS: ${(profile?.specialisms||[]).join(', ')}\nROOM: ${scan.roomType||'room'}\nDIMENSIONS: ${dims.length}m × ${dims.width}m × ${dims.height}m\nFLOOR: ${floorArea}m² WALLS: ${wallArea}m²\nANOMALIES: ${(scan.anomalies||[]).join(', ')||'none'}\nJOB: ${job.jobDescription}\nOUT OF SCOPE: ${job.outOfScope||'none'}\nCUSTOMER SUPPLYING: ${(job.customerSupplied||[]).join(', ')||'nothing'}\n\nReturn JSON array:\n[{"material":"name","quantity":1,"unit":"each","category":"cable|accessories|light-fittings|fixings|consumables|protection|certification","wasteFactor":0.10,"quantityWithWaste":1,"rationale":"why","confidence":"high|medium|low","tradeSearchTerm":"search phrase"}]`;

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'x-api-key': state.profile?.anthropicKey || '', 'anthropic-version':'2023-06-01', 'content-type':'application/json', 'anthropic-dangerous-direct-browser-access':'true' },
        body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:2000, system: systemPrompt, messages:[{ role:'user', content: userPrompt }] })
      });
      if (!resp.ok) throw new Error(`API ${resp.status}`);
      const data = await resp.json();
      const raw = data.content[0].text;
      const match = raw.match(/\[[\s\S]*\]/);
      if (!match) throw new Error('No JSON array in response');
      const items = JSON.parse(match[0]);
      const priced = items.map((item, i) => {
        const lookup = lookupMaterial(item.tradeSearchTerm, item.quantityWithWaste || item.quantity, item.unit, profile?.preferredSuppliers?.electrical, profile?.trade);
        return {
          id: `bom-${Date.now()}-${i}`,
          material: item.material, quantity: item.quantityWithWaste || item.quantity, unit: item.unit,
          category: item.category || 'other', rationale: item.rationale, confidence: item.confidence || 'medium',
          customerSupplied: false,
          catalogueLookup: lookup || { supplierName:'TBC', unitPrice:0, lineTotal:0, allSuppliers:[] },
        };
      });
      setBom(priced);
      setState(prev => ({ ...prev, billOfMaterials: priced }));
    } catch (e) {
      setError(e.message);
      const fallback = buildFallbackBOM(state, lookupMaterial, profile);
      setBom(fallback);
      setState(prev => ({ ...prev, billOfMaterials: fallback }));
    }
    setLoadStep(LOAD_STEPS.length - 1);
    setPhase('editor');
  };

  const buildFallbackBOM = (state, lookup, profile) => {
    const items = [
      { term:'1.5mm twin earth', qty:10, unit:'m', cat:'cable', mat:'1.5mm² twin & earth cable' },
      { term:'6mm earth cable', qty:3, unit:'m', cat:'cable', mat:'6mm earth cable' },
      { term:'ip65 downlight', qty:2, unit:'each', cat:'light-fittings', mat:'IP65 LED downlight 6W warm white' },
      { term:'ip65 shaver', qty:1, unit:'each', cat:'accessories', mat:'IP65 shaver socket' },
      { term:'extractor fan', qty:1, unit:'each', cat:'accessories', mat:'IP65 extractor fan with timer 100mm' },
      { term:'20mm conduit', qty:2, unit:'length', cat:'containment', mat:'20mm white conduit (3m)' },
      { term:'earth clamp 22mm', qty:4, unit:'each', cat:'fixings', mat:'Earth bonding clamp 22mm' },
      { term:'earth sleeving', qty:5, unit:'each', cat:'consumables', mat:'Green/yellow earth sleeving 1m' },
      { term:'electrical certificate', qty:1, unit:'each', cat:'certification', mat:'Electrical Installation Certificate (EIC)' },
      { term:'cable clips', qty:1, unit:'pack', cat:'fixings', mat:'Cable clips white 6mm (100pk)' },
    ];
    return items.map((it, i) => {
      const l = lookup(it.term, it.qty, it.unit, profile?.preferredSuppliers?.electrical, profile?.trade);
      return { id:`bom-f-${i}`, material:it.mat, quantity:it.qty, unit:it.unit, category:it.cat, confidence:'medium', customerSupplied:false, rationale:'Estimated for bathroom electrical refurb', catalogueLookup: l || { supplierName:'TBC', unitPrice:0, lineTotal:+(0).toFixed(2), allSuppliers:[] } };
    });
  };

  const updateQty = (id, qty) => {
    setBom(b => b.map(item => {
      if (item.id !== id) return item;
      const lineTotal = +(item.catalogueLookup.unitPrice * qty).toFixed(2);
      return { ...item, quantity: qty, catalogueLookup: { ...item.catalogueLookup, lineTotal } };
    }));
  };

  const removeItem = (id) => setBom(b => b.filter(i => i.id !== id));

  const toggleCustomerSupplied = (id) => {
    setBom(b => b.map(item => item.id !== id ? item : { ...item, customerSupplied: !item.customerSupplied }));
  };

  const swapSupplier = (itemId, supplier) => {
    setBom(b => b.map(item => {
      if (item.id !== itemId) return item;
      const lineTotal = +(supplier.price * item.quantity).toFixed(2);
      return { ...item, catalogueLookup: { ...item.catalogueLookup, supplierName: supplier.name, unitPrice: supplier.price, lineTotal } };
    }));
    setSwapModal(null);
  };

  const searchCatalogue = (term) => {
    if (!term.trim()) { setAddResults([]); return; }
    const t = term.toLowerCase();
    const results = state.CATALOGUE ? state.CATALOGUE.filter(c => c.name.toLowerCase().includes(t) || c.search.some(s=>s.includes(t))).slice(0,6) : [];
    setAddResults(results);
  };

  const addFromCatalogue = (catItem) => {
    const l = lookupMaterial(catItem.search[0], 1, catItem.unit, state.profile?.preferredSuppliers?.electrical);
    const newItem = { id:`bom-add-${Date.now()}`, material: catItem.name, quantity:1, unit:catItem.unit, category:catItem.category, confidence:'high', customerSupplied:false, rationale:'Manually added', catalogueLookup: l || { supplierName: catItem.suppliers[0]?.name||'TBC', unitPrice: catItem.suppliers[0]?.price||0, lineTotal: catItem.suppliers[0]?.price||0, allSuppliers:catItem.suppliers } };
    setBom(b => [...b, newItem]);
    setAddSearch(''); setAddResults([]);
  };

  const proceed = () => {
    setState(prev => ({ ...prev, billOfMaterials: bom }));
    navigate('#/job/quote');
  };

  const grouped = CATEGORY_DISPLAY_ORDER.reduce((acc, cat) => {
    const displayKey = CATEGORY_LABELS[cat] || cat;
    const items = bom.filter(i => CATEGORY_LABELS[i.category] === displayKey);
    if (items.length) { if (!acc[displayKey]) acc[displayKey] = []; acc[displayKey].push(...items); }
    return acc;
  }, {});

  const matTotal = bom.filter(i=>!i.customerSupplied).reduce((s,i)=>s+(i.catalogueLookup?.lineTotal||0),0);
  const supplierCount = new Set(bom.filter(i=>!i.customerSupplied && i.catalogueLookup?.supplierName!=='TBC').map(i=>i.catalogueLookup?.supplierName)).size;

  const MISSED_ITEMS = [
    { label:'Earth sleeving', term:'earth sleeving' },
    { label:'Cable clips', term:'cable clips' },
    { label:'Warning labels', term:'warning labels' },
    { label:'Connector blocks', term:'connector blocks' },
    { label:'Cable ties', term:'cable ties' },
    { label:'EIC certificate', term:'electrical certificate' },
  ];

  if (phase === 'loading') {
    const job = state.currentJob;
    const dims = job?.scan?.dimensions || {};
    const floorArea = dims.length && dims.width ? (dims.length * dims.width).toFixed(1) : '?';

    // Live calculation messages that appear as steps complete
    const liveCalcs = [
      null,
      `Room: ${dims.length||'?'}m × ${dims.width||'?'}m — floor area ${floorArea}m²`,
      `Cable runs estimated from dimensions + 10% waste factor`,
      `Quantities rounded to nearest stock unit`,
      null,
      null,
    ];

    return (
      <div className="flex-1 flex flex-col items-center justify-center fade-up px-8" style={{ background: '#0D0D0D', minHeight: '100vh' }}>
        <div style={{ maxWidth: 480, width: '100%' }}>
          <div className="text-center mb-10">
            <div className="mb-5"><Spinner size={40} /></div>
            <h2 className="text-3xl font-bold mb-2" style={{ color: '#fff', fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:2 }}>CALCULATING MATERIALS</h2>
            <p className="text-sm" style={{ color:'#4B5563' }}>AccuQuote is working out exactly what you need</p>
          </div>

          <div className="rounded-2xl p-6" style={{ background:'#111418', border:'1px solid #1e2229' }}>
            {LOAD_STEPS.map((s,i) => (
              <div key={i} className="mb-4 last:mb-0">
                <div className="flex items-center gap-3"
                  style={{ opacity: i > loadStep + 1 ? 0.25 : 1, transition:'opacity 0.4s' }}>
                  <div className="flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold"
                    style={{ background: i < loadStep ? '#22C55E' : i === loadStep ? '#FFD600' : '#1e2229', color: i < loadStep || i === loadStep ? '#0D0D0D' : '#4B5563', transition:'background 0.3s' }}>
                    {i < loadStep ? '✓' : i === loadStep ? <Spinner size={12}/> : i+1}
                  </div>
                  <span className="text-sm" style={{ color: i < loadStep ? '#22C55E' : i === loadStep ? '#FFD600' : '#4B5563', fontWeight: i === loadStep ? 600 : 400 }}>
                    {s}
                  </span>
                </div>
                {/* Live calculation detail */}
                {liveCalcs[i] && i <= loadStep && (
                  <div className="ml-9 mt-1.5 px-3 py-1.5 rounded-lg text-xs fade-up" style={{ background:'rgba(255,214,0,0.06)', color:'#6B7280', border:'1px solid rgba(255,214,0,0.1)', fontFamily:'monospace' }}>
                    → {liveCalcs[i]}
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Ghost BOM rows appearing */}
          {loadStep >= 3 && (
            <div className="mt-4 rounded-2xl p-4 fade-up" style={{ background:'#111418', border:'1px solid #1e2229' }}>
              <div className="text-xs uppercase mb-3" style={{ color:'#4B5563', letterSpacing:1 }}>Materials found so far</div>
              {[
                ['2.5mm² twin & earth cable','25m','Screwfix','£21.25'],
                ['IP65 LED downlight 6W','2 each','Screwfix','£25.98'],
                ['IP65 shaver socket','1 each','Screwfix','£22.99'],
                ['Earth bonding clamp 22mm','4 each','Screwfix','£7.96'],
              ].slice(0, loadStep-2).map(([mat,qty,sup,price],i) => (
                <div key={i} className="flex items-center gap-3 py-2 border-b fade-up" style={{ borderColor:'#0D0D0D', animationDelay:`${i*0.1}s` }}>
                  <div className="w-2 h-2 rounded-full flex-shrink-0" style={{ background:'#22C55E' }}/>
                  <span className="text-xs flex-1" style={{ color:'#9CA3AF' }}>{mat}</span>
                  <span className="text-xs" style={{ color:'#6B7280' }}>{qty}</span>
                  <span className="text-xs font-mono" style={{ color:'#FFD600' }}>{price}</span>
                </div>
              ))}
              <div className="pulse h-4 rounded mt-2" style={{ background:'#1e2229', width:'60%' }}/>
            </div>
          )}
        </div>
      </div>
    );
  }

  return (
    <Screen title="Bill of Materials" subtitle={`${bom.length} items · £${matTotal.toFixed(2)} materials`}
      action={<Btn onClick={proceed} disabled={bom.length===0}>Proceed to Quote →</Btn>}>

      {error && (
        <div className="mb-4 px-4 py-3 rounded text-sm" style={{ background:'rgba(127,29,29,0.4)', border:'1px solid #7f1d1d', color:'#fca5a5' }}>
          ⚠ Claude API unavailable — showing estimated BOM. {error} <button onClick={callClaude} className="underline cursor-pointer bg-transparent border-0 text-red-300 ml-2">Retry</button>
        </div>
      )}

      <div className="flex gap-6">
        {/* Main BOM table */}
        <div className="flex-1 flex flex-col gap-4" style={{ minWidth:0 }}>
          {Object.entries(grouped).map(([cat, items]) => (
            <Card key={cat}>
              <button onClick={()=>setCollapsedCats(c=>({...c,[cat]:!c[cat]}))}
                className="flex items-center justify-between w-full cursor-pointer bg-transparent border-0 text-left mb-3">
                <span className="text-sm font-medium" style={{ color:'#E8EDF2' }}>{cat}</span>
                <span className="text-xs" style={{ color:'#FFD600' }}>£{items.filter(i=>!i.customerSupplied).reduce((s,i)=>s+(i.catalogueLookup?.lineTotal||0),0).toFixed(2)}</span>
              </button>
              {!collapsedCats[cat] && (
                <div className="overflow-x-auto">
                  <table className="w-full text-sm" style={{ borderCollapse:'collapse' }}>
                    <thead>
                      <tr style={{ borderBottom:'1px solid #1e2229' }}>
                        <th className="text-left py-1 text-xs text-muted font-medium pb-2">Material</th>
                        <th className="text-right py-1 text-xs text-muted font-medium pb-2 pr-2">Qty</th>
                        <th className="text-left py-1 text-xs text-muted font-medium pb-2">Supplier</th>
                        <th className="text-right py-1 text-xs text-muted font-medium pb-2">Unit £</th>
                        <th className="text-right py-1 text-xs text-muted font-medium pb-2">Total</th>
                        <th className="py-1 pb-2 w-16"></th>
                      </tr>
                    </thead>
                    <tbody>
                      {items.map(item => (
                        <tr key={item.id} style={{ borderBottom:'1px solid #0D0D0D', opacity: item.customerSupplied ? 0.4 : 1 }}>
                          <td className="py-2 pr-2">
                            <div className="flex items-center gap-2">
                              <span className="w-2 h-2 rounded-full flex-shrink-0" style={{ background: item.confidence==='high'?'#22C55E':item.confidence==='medium'?'#F97316':'#EF4444' }} title={`Confidence: ${item.confidence}`} />
                              <span style={{ color:'#E8EDF2', fontSize:12 }}>{item.material}</span>
                            </div>
                          </td>
                          <td className="py-2 pr-2 text-right">
                            <input type="number" value={item.quantity} min={0} step={0.1}
                              onChange={e=>updateQty(item.id, +e.target.value)}
                              className="w-16 text-right rounded px-1 py-0.5 text-xs outline-none"
                              style={{ background:'#0D0D0D', border:'1px solid #1e2229', color:'#FFD600' }} />
                          </td>
                          <td className="py-2 pr-2">
                            <button onClick={()=>setSwapModal({id:item.id, allSuppliers:item.catalogueLookup?.allSuppliers||[]})}
                              className="px-2 py-0.5 rounded text-xs cursor-pointer border-0"
                              style={{ background:'rgba(255,107,0,0.15)', color:'#FF6B00' }}>
                              {item.catalogueLookup?.supplierName||'TBC'}
                            </button>
                          </td>
                          <td className="py-2 pr-2 text-right text-xs text-muted">£{(item.catalogueLookup?.unitPrice||0).toFixed(2)}</td>
                          <td className="py-2 pr-2 text-right text-xs font-medium" style={{ color: item.customerSupplied ? '#6B7280' : '#E8EDF2' }}>
                            £{(item.catalogueLookup?.lineTotal||0).toFixed(2)}
                          </td>
                          <td className="py-2">
                            <div className="flex items-center gap-1">
                              <button onClick={()=>toggleCustomerSupplied(item.id)} title="Customer supplied" className="cursor-pointer bg-transparent border-0 text-xs" style={{ color: item.customerSupplied ? '#FFD600' : '#4B5563' }}>CS</button>
                              <button onClick={()=>removeItem(item.id)} className="cursor-pointer bg-transparent border-0 text-muted" style={{ fontSize:14 }}>×</button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </Card>
          ))}

          {/* Add material */}
          <Card>
            <div className="text-sm font-medium mb-3" style={{ color:'#E8EDF2' }}>+ Add Material</div>
            <input value={addSearch} onChange={e=>{setAddSearch(e.target.value);searchCatalogue(e.target.value);}}
              placeholder="Search catalogue..." className="w-full rounded px-3 py-2 text-sm outline-none"
              style={{ background:'#0D0D0D', border:'1px solid #1e2229', color:'#E8EDF2' }} />
            {addResults.length > 0 && (
              <div className="mt-2 flex flex-col gap-1">
                {addResults.map(r => (
                  <button key={r.id} onClick={()=>addFromCatalogue(r)}
                    className="flex items-center justify-between px-3 py-2 rounded text-sm cursor-pointer border-0 text-left"
                    style={{ background:'#1e2229', color:'#E8EDF2' }}>
                    <span>{r.name}</span>
                    <span style={{ color:'#FFD600' }}>£{r.suppliers[0]?.price?.toFixed(2)}</span>
                  </button>
                ))}
              </div>
            )}
          </Card>

          {/* Missed items checklist */}
          <Card>
            <div className="text-sm font-medium mb-3" style={{ color:'#E8EDF2' }}>Have you included...</div>
            <div className="flex flex-wrap gap-2">
              {MISSED_ITEMS.map(mi => {
                const already = bom.some(i=>i.material.toLowerCase().includes(mi.label.toLowerCase()));
                return (
                  <button key={mi.label} onClick={()=>{ if(!already){ const l=lookupMaterial(mi.term,1,'each',state.profile?.preferredSuppliers?.electrical); const ni={id:`bom-mi-${Date.now()}`,material:mi.label,quantity:1,unit:'each',category:'consumables',confidence:'high',customerSupplied:false,rationale:'Commonly forgotten item',catalogueLookup:l||{supplierName:'TBC',unitPrice:0,lineTotal:0,allSuppliers:[]}}; setBom(b=>[...b,ni]); }}}
                    className="px-3 py-1.5 rounded text-xs cursor-pointer border-0 flex items-center gap-1.5"
                    style={{ background: already ? 'rgba(34,197,94,0.1)' : '#1e2229', color: already ? '#22C55E' : '#9CA3AF', border: already ? '1px solid #22C55E' : '1px solid transparent' }}>
                    {already ? '✓' : '+'} {mi.label}
                  </button>
                );
              })}
            </div>
          </Card>
        </div>

        {/* Summary panel */}
        <div style={{ width:220, flexShrink:0 }}>
          <div className="sticky top-0 flex flex-col gap-3">
            <Card>
              <div className="text-xs text-muted mb-1">Materials subtotal</div>
              <div className="text-2xl font-bold" style={{ color:'#FFD600' }}>£{matTotal.toFixed(2)}</div>
              <div className="text-xs text-muted mt-3">{supplierCount} supplier{supplierCount!==1?'s':''}</div>
              <div className="text-xs text-muted">{bom.length} line items</div>
            </Card>
            <Btn onClick={proceed} disabled={bom.length===0}>Proceed to Quote →</Btn>
          </div>
        </div>
      </div>

      {/* Supplier swap modal */}
      {swapModal && (
        <div className="fixed inset-0 flex items-center justify-center" style={{ background:'rgba(0,0,0,0.7)', zIndex:200 }} onClick={()=>setSwapModal(null)}>
          <div onClick={e=>e.stopPropagation()} className="rounded-lg p-5 w-80" style={{ background:'#111418', border:'1px solid #1e2229' }}>
            <div className="text-sm font-medium mb-4" style={{ color:'#E8EDF2' }}>Swap Supplier</div>
            {swapModal.allSuppliers.length === 0 ? (
              <div className="text-sm text-muted">No alternative suppliers found</div>
            ) : swapModal.allSuppliers.map(s => (
              <button key={s.name} onClick={()=>swapSupplier(swapModal.id, s)}
                className="flex items-center justify-between w-full px-3 py-2 rounded mb-2 cursor-pointer border-0"
                style={{ background:'#1e2229', color:'#E8EDF2' }}>
                <span>{s.name}</span>
                <span style={{ color:'#FFD600' }}>£{s.price.toFixed(2)}</span>
              </button>
            ))}
            <Btn variant="ghost" small onClick={()=>setSwapModal(null)} className="mt-2 w-full">Cancel</Btn>
          </div>
        </div>
      )}
    </Screen>
  );
}

// ─── QUOTE BUILDER SCREEN ─────────────────────────────────────────────────────
function QuoteScreen() {
  const { state, setState } = useApp();
  const profile = state.profile || STUB_PROFILE;
  const bom = state.billOfMaterials || [];
  const job = state.currentJob;

  const matTotal = bom.filter(i=>!i.customerSupplied).reduce((s,i)=>s+(i.catalogueLookup?.lineTotal||0),0);

  const [days, setDays] = useState(job?.estimatedDurationDays || 2);
  const [operatives, setOperatives] = useState(profile.typicalOperatives || 1);
  const [dayRate, setDayRate] = useState(profile.dayRatePerPerson || 350);
  const [extras, setExtras] = useState([
    { id:'travel', label:'Travel & parking', enabled:false, amount: days * 25 },
    { id:'skip', label:'Skip hire', enabled:false, amount:220 },
    { id:'sub', label:'Sub-contractor', enabled:false, amount:0, custom:true },
    { id:'other', label:'Other', enabled:false, amount:0, custom:true },
  ]);
  const [margins, setMargins] = useState({ standard: profile.targetMarginPct||30, premium:(profile.targetMarginPct||30)+8, priority:(profile.targetMarginPct||30)+15 });
  const [tiers, setTiers] = useState({ standard:true, premium:true, priority:false });
  const [depositPct, setDepositPct] = useState(50);

  const labourTotal = days * operatives * dayRate;
  const extrasTotal = extras.filter(e=>e.enabled).reduce((s,e)=>s+e.amount,0);
  const costBase = matTotal + labourTotal + extrasTotal;

  const tierTotal = (pct) => +(costBase / (1 - pct/100)).toFixed(2);
  const vatAmount = (total) => profile.vatRegistered ? +(total * 0.20).toFixed(2) : 0;
  const grandTotal = (total) => +(total + vatAmount(total)).toFixed(2);
  const depositAmount = (gt) => +(gt * depositPct/100).toFixed(2);

  const TIER_DATA = [
    { key:'standard', label:'Standard', icon:'', includes:['Standard work','12-month workmanship guarantee'] },
    { key:'premium', label:'Premium', icon:'★', includes:['2-year guarantee','Priority communications','Detailed completion report'] },
    { key:'priority', label:'Priority', icon:'⚡', includes:['Start within 5 days','2-year guarantee','Senior engineer assigned'] },
  ];

  const atLeastOne = Object.values(tiers).some(Boolean);

  const proceed = () => {
    const selectedTiers = TIER_DATA.filter(t=>tiers[t.key]).map(t => {
      const net = tierTotal(margins[t.key]);
      const vat = vatAmount(net);
      const gt = grandTotal(net);
      return { ...t, margin: margins[t.key], netTotal:net, vatAmount:vat, grandTotal:gt, deposit:depositAmount(gt) };
    });
    const quote = { matTotal, labourTotal, extrasTotal, costBase, days, operatives, dayRate, extras, margins, tiers, depositPct, selectedTiers, createdAt: new Date().toISOString() };
    setState(prev => ({ ...prev, quote, currentJob: { ...prev.currentJob, quote, status:'quoted' }, jobs: prev.jobs.map(j=>j.id===prev.currentJob?.id?{...j,quote,status:'quoted'}:j) }));
    navigate('#/job/send');
  };

  return (
    <Screen title="Quote Builder" subtitle={`Cost base: £${costBase.toFixed(2)}`}
      action={<Btn onClick={proceed} disabled={!atLeastOne}>Build Proposal →</Btn>}>
      <div className="max-w-3xl flex flex-col gap-6">

        {/* Materials summary */}
        <Card>
          <div className="flex items-center justify-between">
            <div className="text-sm font-medium" style={{ color:'#E8EDF2' }}>Materials (from BOM)</div>
            <button onClick={()=>navigate('#/job/materials')} className="text-xs cursor-pointer bg-transparent border-0" style={{ color:'#FF6B00' }}>View full BOM</button>
          </div>
          <div className="text-2xl font-bold mt-1" style={{ color:'#FFD600' }}>£{matTotal.toFixed(2)}</div>
          <div className="text-xs text-muted">{bom.filter(i=>!i.customerSupplied).length} items</div>
        </Card>

        {/* Labour */}
        <Card>
          <div className="text-sm font-medium mb-4" style={{ color:'#E8EDF2' }}>Labour</div>
          <div className="grid grid-cols-3 gap-4 mb-4">
            {[['Days on site','days',days,setDays,1],['Operatives','operatives',operatives,setOperatives,1],['Day rate (£)','dayRate',dayRate,setDayRate,25]].map(([label,key,val,set,step])=>(
              <div key={key}>
                <div className="text-xs text-muted mb-2">{label}</div>
                <div className="flex items-center gap-2">
                  <button onClick={()=>set(v=>Math.max(step,v-step))} className="w-8 h-8 rounded cursor-pointer border-0 font-bold" style={{ background:'#1e2229', color:'#E8EDF2' }}>−</button>
                  <span className="text-base font-bold w-12 text-center" style={{ color:'#FFD600' }}>{key==='dayRate'?`£${val}`:val}</span>
                  <button onClick={()=>set(v=>v+step)} className="w-8 h-8 rounded cursor-pointer border-0 font-bold" style={{ background:'#1e2229', color:'#E8EDF2' }}>+</button>
                </div>
              </div>
            ))}
          </div>
          <div className="flex items-center justify-between pt-3 border-t border-border">
            <span className="text-sm text-muted">Labour subtotal</span>
            <span className="text-lg font-bold" style={{ color:'#E8EDF2' }}>£{labourTotal.toFixed(2)}</span>
          </div>
        </Card>

        {/* Extras */}
        <Card>
          <div className="text-sm font-medium mb-3" style={{ color:'#E8EDF2' }}>Additional Costs</div>
          {extras.map((e,i) => (
            <div key={e.id} className="flex items-center gap-3 py-2 border-b border-border last:border-0">
              <input type="checkbox" checked={e.enabled} onChange={()=>setExtras(ex=>ex.map((x,j)=>j===i?{...x,enabled:!x.enabled}:x))} className="cursor-pointer" style={{ accentColor:'#FFD600' }} />
              <span className="text-sm flex-1" style={{ color: e.enabled ? '#E8EDF2' : '#6B7280' }}>{e.label}</span>
              {e.enabled && (
                <div className="flex items-center gap-1">
                  <span className="text-sm text-muted">£</span>
                  <input type="number" value={e.amount} onChange={ev=>setExtras(ex=>ex.map((x,j)=>j===i?{...x,amount:+ev.target.value}:x))}
                    className="w-20 rounded px-2 py-1 text-sm text-right outline-none"
                    style={{ background:'#0D0D0D', border:'1px solid #1e2229', color:'#FFD600' }} />
                </div>
              )}
            </div>
          ))}
        </Card>

        {/* Cost summary */}
        <Card>
          <div className="text-sm font-medium mb-3" style={{ color:'#E8EDF2' }}>Cost Summary</div>
          {[['Materials',matTotal],['Labour',labourTotal],['Expenses',extrasTotal]].map(([l,v])=>(
            <div key={l} className="flex justify-between py-1.5 text-sm">
              <span className="text-muted">{l}</span>
              <span style={{ color:'#E8EDF2' }}>£{v.toFixed(2)}</span>
            </div>
          ))}
          <div className="flex justify-between py-2 mt-1 border-t border-border text-base font-bold">
            <span style={{ color:'#E8EDF2' }}>Cost base</span>
            <span style={{ color:'#FFD600' }}>£{costBase.toFixed(2)}</span>
          </div>
        </Card>

        {/* Pricing tiers */}
        <div>
          <div className="text-sm font-medium mb-3" style={{ color:'#E8EDF2' }}>Pricing Tiers</div>
          <div className="grid grid-cols-3 gap-4">
            {TIER_DATA.map(t => {
              const net = tierTotal(margins[t.key]);
              const vat = vatAmount(net);
              const gt = grandTotal(net);
              return (
                <div key={t.key} className="rounded-lg p-4 flex flex-col gap-3 cursor-pointer transition-all"
                  style={{ background: tiers[t.key] ? 'rgba(255,214,0,0.06)' : '#111418', border: tiers[t.key] ? '1px solid #FFD600' : '1px solid #1e2229' }}
                  onClick={()=>setTiers(ts=>({ ...ts,[t.key]:!ts[t.key] }))}>
                  <div className="flex items-center justify-between">
                    <span className="text-sm font-medium" style={{ color:'#E8EDF2' }}>{t.label} {t.icon}</span>
                    <div className="w-4 h-4 rounded border flex items-center justify-center" style={{ border: tiers[t.key] ? '2px solid #FFD600' : '2px solid #374151', background: tiers[t.key] ? '#FFD600' : 'transparent' }}>
                      {tiers[t.key] && <span style={{ color:'#0D0D0D', fontSize:10, fontWeight:700 }}>✓</span>}
                    </div>
                  </div>
                  <div>
                    <div className="flex items-center gap-2 mb-1">
                      <span className="text-xs text-muted">Margin</span>
                      <input type="range" min={10} max={60} value={margins[t.key]}
                        onChange={e=>setMargins(m=>({...m,[t.key]:+e.target.value}))}
                        onClick={e=>e.stopPropagation()} className="flex-1 cursor-pointer" style={{ accentColor:'#FFD600' }} />
                      <span className="text-xs font-bold w-8" style={{ color:'#FFD600' }}>{margins[t.key]}%</span>
                    </div>
                    <div className="text-xl font-bold" style={{ color:'#FFD600' }}>£{gt.toLocaleString()}</div>
                    {profile.vatRegistered && <div className="text-xs text-muted">+VAT £{vat.toFixed(2)}</div>}
                  </div>
                  <div className="flex flex-col gap-1">
                    {t.includes.map(inc=><div key={inc} className="text-xs text-muted">• {inc}</div>)}
                  </div>
                </div>
              );
            })}
          </div>
          {!atLeastOne && <div className="text-xs mt-2" style={{ color:'#EF4444' }}>Select at least one tier</div>}
        </div>

        {/* Deposit */}
        <Card>
          <div className="text-sm font-medium mb-3" style={{ color:'#E8EDF2' }}>Deposit</div>
          <div className="flex gap-2 mb-3">
            {[25,50,100].map(p=>(
              <button key={p} onClick={()=>setDepositPct(p)}
                className="px-4 py-2 rounded text-sm cursor-pointer border-0"
                style={{ background:depositPct===p?'#FFD600':'#1e2229', color:depositPct===p?'#0D0D0D':'#9CA3AF', fontWeight:depositPct===p?600:400 }}>
                {p===100?'On completion':`${p}%`}
              </button>
            ))}
            <input type="number" value={depositPct} onChange={e=>setDepositPct(+e.target.value)} min={0} max={100}
              placeholder="Custom %" className="w-24 rounded px-3 py-2 text-sm outline-none"
              style={{ background:'#0D0D0D', border:'1px solid #1e2229', color:'#FFD600' }} />
          </div>
          {TIER_DATA.filter(t=>tiers[t.key]).map(t=>{
            const gt = grandTotal(tierTotal(margins[t.key]));
            return (
              <div key={t.key} className="flex justify-between text-sm py-1">
                <span className="text-muted">{t.label} deposit ({depositPct}%)</span>
                <span style={{ color:'#FFD600' }}>£{depositAmount(gt).toFixed(2)}</span>
              </div>
            );
          })}
        </Card>

        <Btn onClick={proceed} disabled={!atLeastOne}>Build Proposal →</Btn>
      </div>
    </Screen>
  );
}

// ─── JOB SCAN SCREEN ─────────────────────────────────────────────────────────
function ScanScreen() {
  const { state, setState } = useApp();
  const [phase, setPhase] = useState('ready'); // ready | scanning | confirm
  const [scanPct, setScanPct] = useState(0);
  const [scanMsg, setScanMsg] = useState('');
  const [dims, setDims] = useState(state.currentJob?.scan?.dimensions || { length:'', width:'', height:'' });
  const [roomType, setRoomType] = useState(state.currentJob?.scan?.roomType || '');

  const SCAN_STEPS = [
    [15, 'Detecting walls...'],
    [32, 'Mapping floor plane...'],
    [50, 'Measuring room length...'],
    [67, 'Measuring room width...'],
    [80, 'Calculating ceiling height...'],
    [92, 'Detecting doors & windows...'],
    [100, 'Scan complete'],
  ];

  const startScan = () => {
    setPhase('scanning');
    setScanPct(0);
    let i = 0;
    const tick = () => {
      if (i >= SCAN_STEPS.length) return;
      const [pct, msg] = SCAN_STEPS[i++];
      setScanPct(pct);
      setScanMsg(msg);
      if (pct < 100) setTimeout(tick, 600 + Math.random() * 500);
      else {
        // Simulate realistic dimensions
        const l = (3 + Math.random() * 2).toFixed(1);
        const w = (2 + Math.random() * 2).toFixed(1);
        const h = (2.3 + Math.random() * 0.4).toFixed(1);
        setDims({ length: l, width: w, height: h });
        setTimeout(() => setPhase('confirm'), 600);
      }
    };
    setTimeout(tick, 400);
  };

  const proceed = () => {
    const scan = {
      roomType: roomType || 'room',
      dimensions: { length: +dims.length, width: +dims.width, height: +dims.height },
      features: { windowCount: 1, doorCount: 1, existingSocketCount: 1, existingLightCount: 1 },
      anomalies: [],
    };
    const jobId = `AQ-${new Date().getFullYear()}-${String(Math.floor(Math.random()*900)+100)}`;
    const job = state.currentJob ? { ...state.currentJob, scan } : {
      id: jobId, status: 'scan', scan,
      customer: { name:'', email:'', phone:'', address:'' },
      jobDescription:'', outOfScope:'', customerSupplied:[],
      proposedStartDate:'', estimatedDurationDays: 1,
      createdAt: new Date().toISOString(),
    };
    setState(prev => ({ ...prev, currentJob: job, jobs: prev.jobs.find(j=>j.id===job.id) ? prev.jobs.map(j=>j.id===job.id?job:j) : [...prev.jobs, job] }));
    navigate('#/job/describe');
  };

  // ── READY ──
  if (phase === 'ready') {
    return (
      <div className="flex-1 flex flex-col items-center justify-center fade-up" style={{ background: '#0D0D0D', minHeight: '100vh' }}>
        <div className="text-center px-8" style={{ maxWidth: 480 }}>
          {/* Animated scan icon */}
          <div className="relative mx-auto mb-10" style={{ width: 120, height: 120 }}>
            <div className="absolute inset-0 rounded-2xl" style={{ border: '2px solid rgba(255,214,0,0.3)' }} />
            <div className="absolute inset-0 flex items-center justify-center">
              <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <rect x="4" y="4" width="12" height="2" fill="#FFD600"/>
                <rect x="4" y="4" width="2" height="12" fill="#FFD600"/>
                <rect x="32" y="4" width="12" height="2" fill="#FFD600"/>
                <rect x="42" y="4" width="2" height="12" fill="#FFD600"/>
                <rect x="4" y="42" width="12" height="2" fill="#FFD600"/>
                <rect x="4" y="32" width="2" height="12" fill="#FFD600"/>
                <rect x="32" y="42" width="12" height="2" fill="#FFD600"/>
                <rect x="42" y="32" width="2" height="12" fill="#FFD600"/>
                <line x1="8" y1="24" x2="40" y2="24" stroke="rgba(255,214,0,0.4)" strokeWidth="1" strokeDasharray="3 3"/>
              </svg>
            </div>
            {/* Corner pulse rings */}
            <div className="absolute inset-0 rounded-2xl pulse" style={{ border: '1px solid rgba(255,214,0,0.15)' }} />
          </div>

          <h1 className="text-5xl font-bold mb-4" style={{ color: '#fff', fontFamily: "'Barlow Condensed', sans-serif", letterSpacing: 2 }}>SCAN SPACE</h1>
          <p className="text-base mb-12" style={{ color: '#6B7280', lineHeight: 1.6 }}>
            Point your phone around the room.<br/>AccuQuote measures the dimensions automatically.
          </p>

          <button onClick={startScan}
            className="w-full py-5 rounded-2xl text-lg font-bold cursor-pointer border-0 transition-all"
            style={{ background: '#FFD600', color: '#0D0D0D', letterSpacing: 1 }}>
            Start Scan
          </button>

          <button onClick={() => setPhase('confirm')}
            className="mt-4 w-full py-3 rounded-xl text-sm cursor-pointer border-0"
            style={{ background: 'transparent', color: '#4B5563', border: '1px solid #1e2229' }}>
            Enter dimensions manually
          </button>
        </div>
      </div>
    );
  }

  // ── SCANNING ──
  if (phase === 'scanning') {
    const circumference = 2 * Math.PI * 54;
    return (
      <div className="flex-1 flex flex-col items-center justify-center fade-up" style={{ background: '#0D0D0D', minHeight: '100vh' }}>
        <div className="text-center px-8" style={{ maxWidth: 360 }}>
          <div className="relative mx-auto mb-8" style={{ width: 140, height: 140 }}>
            <svg viewBox="0 0 140 140" width="140" height="140">
              <circle cx="70" cy="70" r="54" fill="none" stroke="#1e2229" strokeWidth="6"/>
              <circle cx="70" cy="70" r="54" fill="none" stroke="#FFD600" strokeWidth="6"
                strokeDasharray={circumference}
                strokeDashoffset={circumference * (1 - scanPct / 100)}
                strokeLinecap="round"
                style={{ transformOrigin:'center', transform:'rotate(-90deg)', transition:'stroke-dashoffset 0.5s ease' }}/>
            </svg>
            <div className="absolute inset-0 flex flex-col items-center justify-center">
              <span className="text-3xl font-bold" style={{ color:'#FFD600', fontFamily:"'Barlow Condensed',sans-serif" }}>{scanPct}%</span>
            </div>
          </div>
          <div className="text-base font-medium mb-2" style={{ color: '#E8EDF2' }}>{scanMsg}</div>
          <div className="text-sm" style={{ color: '#4B5563' }}>Keep moving slowly around the room</div>
        </div>
      </div>
    );
  }

  // ── CONFIRM ──
  const floorArea = dims.length && dims.width ? (dims.length * dims.width).toFixed(2) : null;
  const ROOM_TYPES = ['Bathroom','Kitchen','Bedroom','Living Room','Hallway','Garage','Office','Loft','Garden','Utility'];

  return (
    <div className="flex-1 flex flex-col items-center justify-center fade-up px-6 py-10" style={{ background: '#0D0D0D', minHeight: '100vh' }}>
      <div style={{ maxWidth: 440, width: '100%' }}>
        <div className="text-center mb-8">
          <div className="text-3xl mb-2" style={{ color: '#22C55E' }}>✓</div>
          <h2 className="text-2xl font-bold mb-1" style={{ color: '#fff', fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:2 }}>SCAN COMPLETE</h2>
          <p className="text-sm" style={{ color: '#6B7280' }}>Review the dimensions below</p>
        </div>

        {/* Dimensions display */}
        <div className="rounded-2xl p-6 mb-4" style={{ background: '#111418', border: '1px solid #1e2229' }}>
          <div className="grid grid-cols-3 gap-4 mb-5">
            {['length','width','height'].map(d => (
              <div key={d} className="text-center">
                <div className="text-xs uppercase mb-2" style={{ color: '#6B7280', letterSpacing: 1 }}>{d}</div>
                <input type="number" step="0.1" value={dims[d]}
                  onChange={e => setDims(x => ({...x,[d]:e.target.value}))}
                  className="w-full text-center rounded-xl py-3 text-xl font-bold outline-none"
                  style={{ background: '#0D0D0D', border: '1px solid #2a2e36', color: '#FFD600', fontFamily:"'Barlow Condensed',sans-serif" }}/>
                <div className="text-xs mt-1" style={{ color: '#4B5563' }}>metres</div>
              </div>
            ))}
          </div>
          {floorArea && (
            <div className="text-center text-sm pt-3" style={{ borderTop: '1px solid #1e2229', color: '#6B7280' }}>
              Floor area <span className="font-bold" style={{ color: '#FFD600' }}>{floorArea}m²</span>
            </div>
          )}
        </div>

        {/* Room type */}
        <div className="rounded-2xl p-4 mb-6" style={{ background: '#111418', border: '1px solid #1e2229' }}>
          <div className="text-xs uppercase mb-3" style={{ color: '#6B7280', letterSpacing: 1 }}>Room type</div>
          <div className="flex flex-wrap gap-2">
            {ROOM_TYPES.map(r => (
              <button key={r} onClick={() => setRoomType(r.toLowerCase())}
                className="px-3 py-1.5 rounded-lg text-xs cursor-pointer border-0 transition-all"
                style={{ background: roomType===r.toLowerCase() ? '#FFD600' : '#1e2229', color: roomType===r.toLowerCase() ? '#0D0D0D' : '#6B7280', fontWeight: roomType===r.toLowerCase() ? 700 : 400 }}>
                {r}
              </button>
            ))}
          </div>
        </div>

        <button onClick={proceed}
          className="w-full py-4 rounded-2xl text-base font-bold cursor-pointer border-0"
          style={{ background: '#FFD600', color: '#0D0D0D', letterSpacing: 1 }}
          disabled={!dims.length || !dims.width || !dims.height}>
          Describe the Job →
        </button>

        <button onClick={() => setPhase('ready')} className="w-full mt-3 py-3 text-sm cursor-pointer border-0 bg-transparent" style={{ color: '#4B5563' }}>
          ← Scan again
        </button>
      </div>
    </div>
  );
}

// ─── JOB DESCRIBE SCREEN ─────────────────────────────────────────────────────
function DescribeScreen() {
  const { state, setState } = useApp();
  const job = state.currentJob;
  const [phase, setPhase] = useState('listening'); // listening | review
  const [listening, setListening] = useState(false);
  const [transcript, setTranscript] = useState('');
  const [interimText, setInterimText] = useState('');
  const [extractedItems, setExtractedItems] = useState([]);
  const [customer, setCustomer] = useState(job?.customer || { name:'', email:'', phone:'', address:'' });
  const [startDate, setStartDate] = useState(job?.proposedStartDate || '');
  const [duration, setDuration] = useState(job?.estimatedDurationDays || 1);
  const [extraNote, setExtraNote] = useState('');
  const recognitionRef = useRef(null);

  // Extract key items from transcript using simple keyword matching
  // (Claude will do the real extraction in materials screen)
  const extractItems = (text) => {
    const patterns = [
      { re: /shaver socket/i, label: 'Shaver socket' },
      { re: /ip65|ip 65/i, label: 'IP65 rated fittings' },
      { re: /downlight|down light/i, label: 'LED downlights' },
      { re: /extractor fan|extract fan/i, label: 'Extractor fan' },
      { re: /earth bond|bonding/i, label: 'Earth bonding' },
      { re: /consumer unit|fuse ?board|cu /i, label: 'Consumer unit work' },
      { re: /socket/i, label: 'Sockets' },
      { re: /switch/i, label: 'Light switches' },
      { re: /cable|wir/i, label: 'New cabling' },
      { re: /certif|eic|test/i, label: 'Testing & certification' },
      { re: /strip out|remove|replac/i, label: 'Strip out & removal' },
      { re: /making good/i, label: 'Making good' },
      { re: /ev charge|electric vehicle/i, label: 'EV charger' },
      { re: /pendant|ceiling light/i, label: 'Ceiling light fitting' },
      { re: /outdoor|external|outside/i, label: 'Outdoor works' },
    ];
    const found = patterns.filter(p => p.re.test(text)).map(p => p.label);
    // Deduplicate
    return [...new Set(found)];
  };

  const toggleMic = () => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      // No speech API — go straight to review with placeholder
      setTranscript('Speech recognition not available. Please use the text field below.');
      setExtractedItems([]);
      setPhase('review');
      return;
    }
    if (listening) {
      recognitionRef.current?.stop();
      setListening(false);
    } else {
      const r = new SR();
      r.continuous = true; r.interimResults = true; r.lang = 'en-GB';
      r.onresult = (e) => {
        let final = '';
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
          else interim = e.results[i][0].transcript;
        }
        if (final) setTranscript(t => t + final);
        setInterimText(interim);
      };
      r.onend = () => { setListening(false); setInterimText(''); };
      r.start();
      recognitionRef.current = r;
      setListening(true);
    }
  };

  const finishSpeaking = () => {
    recognitionRef.current?.stop();
    setListening(false);
    const items = extractItems(transcript);
    setExtractedItems(items);
    setPhase('review');
  };

  const loadDemo = () => {
    const t = 'Full bathroom electrical refurb. Strip out the old round-pin sockets, there\'s one by the sink which isn\'t to regs. Install a new shaver socket above the mirror, IP65 rated. Two new LED downlights in the ceiling replacing the old pendant, need to be IP65 as well, six watt warm white. Run new earth bonding to the copper pipework under the sink and to the bath. New dedicated extractor fan circuit from the consumer unit. All circuits to be tested and certified, I\'ll provide an Electrical Installation Certificate.';
    setTranscript(t);
    setExtractedItems(extractItems(t));
    setCustomer({ name:'Mr & Mrs Thompson', email:'j.thompson@gmail.com', phone:'07891 234567', address:'42 Maple Avenue, Bushey, WD23 2BT' });
    setStartDate('2025-05-15');
    setDuration(2);
    setPhase('review');
  };

  const proceed = () => {
    const fullDesc = transcript + (extraNote ? '\n\nAdditional notes: ' + extraNote : '');
    const updated = {
      ...job, customer,
      jobDescription: fullDesc,
      outOfScope: '',
      proposedStartDate: startDate,
      estimatedDurationDays: +duration,
      status: 'describe',
    };
    setState(prev => ({ ...prev, currentJob: updated, jobs: prev.jobs.map(j => j.id === updated.id ? updated : j) }));
    navigate('#/job/materials');
  };

  // ── LISTENING PHASE ──
  if (phase === 'listening') {
    return (
      <div className="flex-1 flex flex-col items-center justify-center fade-up" style={{ background: '#0D0D0D', minHeight: '100vh' }}>
        <div className="text-center px-8" style={{ maxWidth: 480, width: '100%' }}>

          <h1 className="text-4xl font-bold mb-3" style={{ color: '#fff', fontFamily:"'Barlow Condensed',sans-serif", letterSpacing: 2 }}>
            DESCRIBE THE JOB
          </h1>
          <p className="text-base mb-12" style={{ color: '#6B7280' }}>
            Tap the mic and tell AccuQuote what needs doing in your own words.
          </p>

          {/* Big mic button */}
          <div className="flex flex-col items-center mb-10">
            <button onClick={toggleMic}
              className="rounded-full flex items-center justify-center cursor-pointer border-0 transition-all mb-6"
              style={{
                width: 140, height: 140,
                background: listening ? 'rgba(255,107,0,0.15)' : 'rgba(255,214,0,0.1)',
                border: listening ? '3px solid #FF6B00' : '3px solid #FFD600',
                boxShadow: listening ? '0 0 40px rgba(255,107,0,0.3)' : '0 0 20px rgba(255,214,0,0.1)',
              }}>
              {listening ? (
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                  <rect x="16" y="12" width="6" height="24" rx="3" fill="#FF6B00"/>
                  <rect x="26" y="12" width="6" height="24" rx="3" fill="#FF6B00"/>
                </svg>
              ) : (
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                  <rect x="18" y="8" width="12" height="22" rx="6" fill="#FFD600"/>
                  <path d="M10 24c0 7.7 6.3 14 14 14s14-6.3 14-14" stroke="#FFD600" strokeWidth="3" strokeLinecap="round"/>
                  <line x1="24" y1="38" x2="24" y2="44" stroke="#FFD600" strokeWidth="3" strokeLinecap="round"/>
                  <line x1="18" y1="44" x2="30" y2="44" stroke="#FFD600" strokeWidth="3" strokeLinecap="round"/>
                </svg>
              )}
            </button>

            {listening && (
              <div className="fade-up">
                <div className="flex items-center gap-1 mb-3">
                  {[1,2,3,4,5].map(i => (
                    <div key={i} className="rounded-full" style={{ width: 4, height: 4+Math.random()*20, background: '#FF6B00', animation: `pulse ${0.5+i*0.15}s ease-in-out infinite` }} />
                  ))}
                </div>
                <div className="text-sm mb-1" style={{ color: '#FF6B00' }}>Listening...</div>
                {interimText && <div className="text-xs italic" style={{ color:'#4B5563', maxWidth:300 }}>{interimText}</div>}
              </div>
            )}

            {!listening && !transcript && (
              <div className="text-sm" style={{ color: '#4B5563' }}>Tap to start speaking</div>
            )}

            {transcript && !listening && (
              <div className="text-sm" style={{ color: '#22C55E' }}>✓ Captured — tap again to add more</div>
            )}
          </div>

          {/* Live transcript preview */}
          {transcript && (
            <div className="rounded-2xl p-4 mb-6 text-left fade-up" style={{ background: '#111418', border: '1px solid #1e2229' }}>
              <div className="text-xs uppercase mb-2" style={{ color: '#4B5563', letterSpacing: 1 }}>Transcript</div>
              <p className="text-sm leading-relaxed" style={{ color: '#9CA3AF' }}>{transcript}</p>
            </div>
          )}

          <div className="flex flex-col gap-3">
            {transcript && (
              <button onClick={finishSpeaking}
                className="w-full py-4 rounded-2xl text-base font-bold cursor-pointer border-0"
                style={{ background: '#FFD600', color: '#0D0D0D', letterSpacing: 1 }}>
                That's everything →
              </button>
            )}
            {listening && (
              <button onClick={finishSpeaking}
                className="w-full py-4 rounded-2xl text-base font-bold cursor-pointer border-0"
                style={{ background: '#FFD600', color: '#0D0D0D', letterSpacing: 1 }}>
                Done speaking →
              </button>
            )}
            <button onClick={loadDemo}
              className="w-full py-3 rounded-xl text-sm cursor-pointer border-0"
              style={{ background: 'transparent', color: '#4B5563', border: '1px solid #1e2229' }}>
              Load demo job
            </button>
          </div>
        </div>
      </div>
    );
  }

  // ── REVIEW PHASE ──
  return (
    <div className="flex-1 flex flex-col items-center fade-up px-6 py-10 overflow-y-auto" style={{ background: '#0D0D0D', minHeight: '100vh' }}>
      <div style={{ maxWidth: 520, width: '100%' }}>
        <h2 className="text-3xl font-bold mb-2 text-center" style={{ color: '#fff', fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:2 }}>REVIEW JOB</h2>
        <p className="text-sm text-center mb-8" style={{ color: '#6B7280' }}>Confirm what AccuQuote heard and add any details</p>

        {/* Extracted items as bubbles */}
        {extractedItems.length > 0 && (
          <div className="rounded-2xl p-5 mb-5" style={{ background: '#111418', border: '1px solid #1e2229' }}>
            <div className="text-xs uppercase mb-4" style={{ color: '#6B7280', letterSpacing: 1 }}>Items identified</div>
            <div className="flex flex-wrap gap-2">
              {extractedItems.map((item, i) => (
                <div key={i} className="flex items-center gap-2 px-3 py-2 rounded-xl text-sm fade-up"
                  style={{ background: 'rgba(255,214,0,0.1)', border: '1px solid rgba(255,214,0,0.3)', color: '#FFD600', animationDelay: `${i*0.05}s` }}>
                  <span style={{ color: '#22C55E', fontSize: 10 }}>✓</span>
                  {item}
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Full transcript (editable) */}
        <div className="rounded-2xl p-5 mb-5" style={{ background: '#111418', border: '1px solid #1e2229' }}>
          <div className="flex items-center justify-between mb-3">
            <div className="text-xs uppercase" style={{ color: '#6B7280', letterSpacing: 1 }}>Full description</div>
            <button onClick={() => setPhase('listening')}
              className="text-xs cursor-pointer bg-transparent border-0 flex items-center gap-1"
              style={{ color: '#4B5563' }}>
              🎤 Re-record
            </button>
          </div>
          <textarea value={transcript} onChange={e => setTranscript(e.target.value)} rows={5}
            className="w-full rounded-xl px-3 py-2 text-sm outline-none resize-none"
            style={{ background: '#0D0D0D', border: '1px solid #1e2229', color: '#9CA3AF', fontFamily: 'inherit', lineHeight: 1.6 }} />
        </div>

        {/* Additional notes */}
        <div className="rounded-2xl p-5 mb-5" style={{ background: '#111418', border: '1px solid #1e2229' }}>
          <div className="text-xs uppercase mb-3" style={{ color: '#6B7280', letterSpacing: 1 }}>Anything to add?</div>
          <textarea value={extraNote} onChange={e => setExtraNote(e.target.value)} rows={2}
            placeholder="Any out-of-scope work, customer supplying items, access issues..."
            className="w-full rounded-xl px-3 py-2 text-sm outline-none resize-none"
            style={{ background: '#0D0D0D', border: '1px solid #1e2229', color: '#E8EDF2', fontFamily: 'inherit', lineHeight: 1.6 }} />
        </div>

        {/* Customer & dates */}
        <div className="rounded-2xl p-5 mb-6" style={{ background: '#111418', border: '1px solid #1e2229' }}>
          <div className="text-xs uppercase mb-4" style={{ color: '#6B7280', letterSpacing: 1 }}>Job details</div>
          <div className="grid grid-cols-2 gap-3 mb-4">
            {[['Customer name','name','Mr & Mrs Thompson'],['Phone','phone','07891 234567'],['Email','email','customer@email.com'],['Address','address','42 Maple Ave, Bushey']].map(([label,key,ph]) => (
              <div key={key}>
                <div className="text-xs mb-1" style={{ color:'#4B5563' }}>{label}</div>
                <input value={customer[key]} onChange={e => setCustomer(c=>({...c,[key]:e.target.value}))}
                  placeholder={ph} className="w-full rounded-lg px-3 py-2 text-sm outline-none"
                  style={{ background:'#0D0D0D', border:'1px solid #1e2229', color:'#E8EDF2' }}/>
              </div>
            ))}
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <div className="text-xs mb-1" style={{ color:'#4B5563' }}>Start date</div>
              <input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)}
                className="w-full rounded-lg px-3 py-2 text-sm outline-none"
                style={{ background:'#0D0D0D', border:'1px solid #1e2229', color:'#E8EDF2' }}/>
            </div>
            <div>
              <div className="text-xs mb-1" style={{ color:'#4B5563' }}>Duration (days)</div>
              <div className="flex items-center gap-3">
                <button onClick={()=>setDuration(d=>Math.max(1,d-1))} className="w-9 h-9 rounded-lg cursor-pointer border-0 font-bold text-lg" style={{ background:'#1e2229', color:'#E8EDF2' }}>−</button>
                <span className="text-xl font-bold" style={{ color:'#FFD600' }}>{duration}</span>
                <button onClick={()=>setDuration(d=>d+1)} className="w-9 h-9 rounded-lg cursor-pointer border-0 font-bold text-lg" style={{ background:'#1e2229', color:'#E8EDF2' }}>+</button>
              </div>
            </div>
          </div>
        </div>

        <button onClick={proceed} disabled={!transcript}
          className="w-full py-4 rounded-2xl text-base font-bold cursor-pointer border-0"
          style={{ background: transcript ? '#FFD600' : '#1e2229', color: transcript ? '#0D0D0D' : '#4B5563', letterSpacing: 1 }}>
          Calculate Materials →
        </button>
      </div>
    </div>
  );
}

// ─── PLACEHOLDER SCREENS (filled in next passes) ─────────────────────────────
function PlaceholderScreen({ title, next, nextLabel }) {
  return (
    <Screen title={title}>
      <div className="flex flex-col items-center justify-center py-20 text-center">
        <div className="text-5xl mb-4">🚧</div>
        <div className="text-lg font-medium mb-2" style={{ color: '#E8EDF2' }}>Coming in next build pass</div>
        <div className="text-muted text-sm mb-6">{title} screen</div>
        {next && <Btn onClick={() => navigate(next)}>{nextLabel || 'Continue →'}</Btn>}
      </div>
    </Screen>
  );
}

// ─── ROUTER ───────────────────────────────────────────────────────────────────
function Router() {
  const route = useHashRoute();
  const { state } = useApp();

  if (!state.profile) return <OnboardingScreen />;

  const views = {
    '#/': <DashboardScreen />,
    '#/settings': <SettingsScreen />,
    '#/job/scan': <ScanScreen />,
    '#/job/describe': <DescribeScreen />,
    '#/job/materials': <MaterialsScreen />,
    '#/job/quote': <QuoteScreen />,
    '#/job/send': <SendProposalScreen />,
    '#/job/proposal': <ProposalScreen />,
    '#/job/accepted': <AcceptanceScreen />,
    '#/job/orders': <OrdersScreen />,
  };

  const content = views[route] || views['#/'];

  return (
    <div className="flex" style={{ minHeight: '100vh' }}>
      <Sidebar route={route} />
      <main className="flex-1 flex flex-col" style={{ minWidth: 0 }}>
        {content}
      </main>
    </div>
  );
}

// ─── DEMO BUTTON ──────────────────────────────────────────────────────────────
function DemoButton() {
  const { loadDemo } = useApp();
  const [open, setOpen] = useState(false);
  return (
    <div className="no-print" style={{ position:'fixed', bottom:24, right:24, zIndex:999 }}>
      {open && (
        <div className="mb-2 rounded-lg p-3 flex flex-col gap-2 fade-up" style={{ background:'#111418', border:'1px solid #1e2229', minWidth:180 }}>
          <button onClick={() => { loadDemo(); navigate('#/'); setOpen(false); }}
            className="text-left text-sm px-3 py-2 rounded cursor-pointer border-0"
            style={{ background:'transparent', color:'#E8EDF2' }}>
            📋 Load Demo Job
          </button>
          <button onClick={() => { loadDemo(); navigate('#/job/describe'); setOpen(false); }}
            className="text-left text-sm px-3 py-2 rounded cursor-pointer border-0"
            style={{ background:'transparent', color:'#E8EDF2' }}>
            ▶ Jump to Describe
          </button>
          <button onClick={() => { loadDemo(); navigate('#/job/materials'); setOpen(false); }}
            className="text-left text-sm px-3 py-2 rounded cursor-pointer border-0"
            style={{ background:'transparent', color:'#E8EDF2' }}>
            ▶ Jump to Materials
          </button>
          <button onClick={() => { loadDemo(); navigate('#/job/quote'); setOpen(false); }}
            className="text-left text-sm px-3 py-2 rounded cursor-pointer border-0"
            style={{ background:'transparent', color:'#E8EDF2' }}>
            ▶ Jump to Quote
          </button>
          <button onClick={() => { loadDemo(); navigate('#/job/send'); setOpen(false); }}
            className="text-left text-sm px-3 py-2 rounded cursor-pointer border-0"
            style={{ background:'transparent', color:'#E8EDF2' }}>
            ▶ Jump to Send Proposal
          </button>
          <button onClick={() => { loadDemo(); navigate('#/job/proposal'); setOpen(false); }}
            className="text-left text-sm px-3 py-2 rounded cursor-pointer border-0"
            style={{ background:'transparent', color:'#E8EDF2' }}>
            ▶ Jump to Proposal Editor
          </button>
          <button onClick={() => { loadDemo(); navigate('#/job/accepted'); setOpen(false); }}
            className="text-left text-sm px-3 py-2 rounded cursor-pointer border-0"
            style={{ background:'transparent', color:'#E8EDF2' }}>
            ▶ Jump to Acceptance
          </button>
          <button onClick={() => { loadDemo(); navigate('#/job/orders'); setOpen(false); }}
            className="text-left text-sm px-3 py-2 rounded cursor-pointer border-0"
            style={{ background:'transparent', color:'#E8EDF2' }}>
            ▶ Jump to Orders
          </button>
        </div>
      )}
      <button onClick={() => setOpen(o => !o)}
        className="rounded-full text-xs font-bold cursor-pointer border-0 shadow-lg"
        style={{ background:'#1e2229', color:'#6B7280', width:40, height:40, display:'flex', alignItems:'center', justifyContent:'center', border:'1px solid #2a2e36' }}>
        DEMO
      </button>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  return (
    <AppProvider>
      <Router />
      <DemoButton />
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
