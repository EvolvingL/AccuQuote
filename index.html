function lookupMaterial(searchTerm, quantity, unit, preferredSuppliers, trade) {
  if (!searchTerm) return null;
  const term = searchTerm.toLowerCase();
  let best = null;
  let bestScore = 0;

  for (const item of CATALOGUE) {
    let score = 0;
    const nameLower = item.name.toLowerCase();
    if (nameLower.includes(term)) score += 10;
    for (const s of item.search) {
      if (s.includes(term)) score += 8;
      if (term.includes(s)) score += 6;
      const words = term.split(/\s+/);
      const matchedWords = words.filter(w => s.includes(w) || nameLower.includes(w));
      score += matchedWords.length * 2;
    }
    if (score > bestScore) { bestScore = score; best = item; }
  }

  if (!best || bestScore < 2) return null;

  // Pick preferred supplier
  const preferred = (preferredSuppliers || ['Screwfix']);
  let supplier = best.suppliers.find(s => preferred.includes(s.name)) || best.suppliers[0];

  const unitPrice = supplier.price;
  const lineTotal = +(unitPrice * (quantity || 1)).toFixed(2);

  return {
    catalogueId: best.id,
    materialName: best.name,
    category: best.category,
    unit: unit || best.unit,
    supplierName: supplier.name,
    supplierSku: supplier.sku,
    unitPrice,
    lineTotal,
    allSuppliers: best.suppliers,
  };
}

// ─── ROUTER (hash-based) ─────────────────────────────────────────────────────
function useHashRoute() {
  const [route, setRoute] = useState(location.hash || '#/');
  useEffect(() => {
    const handler = () => setRoute(location.hash || '#/');
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  return route;
}

function navigate(hash) { location.hash = hash; }

  { id: 'quote',     label: 'Quote',     hash: '#/job/quote' },
  { id: 'send',      label: 'Send',      hash: '#/job/send' },
  { id: 'accepted',  label: 'Accepted',  hash: '#/job/accepted' },
  { id: 'ordered',   label: 'Ordered',   hash: '#/job/orders' },
];

function stepIndexFromRoute(route) {
  if (route.includes('/job/scan')) return 0;
  if (route.includes('/job/describe')) return 1;
  if (route.includes('/job/materials')) return 2;
  if (route.includes('/job/quote')) return 3;
  if (route.includes('/job/send')) return 4;
  if (route.includes('/job/accepted')) return 5;
  if (route.includes('/job/orders')) return 6;
  return -1;
}

// ─── REUSABLE COMPONENTS ──────────────────────────────────────────────────────
function Btn({ children, onClick, variant='primary', disabled, className='', type='button', small }) {
  const base = 'font-medium rounded transition-all cursor-pointer border-0 flex items-center gap-2 justify-center';
  const pad = small ? 'px-3 py-1.5 text-xs' : 'px-4 py-2.5 text-sm';
  const variants = {
    primary: { background: '#FFD600', color: '#0D0D0D', opacity: disabled ? 0.4 : 1 },
    secondary: { background: '#1e2229', color: '#E8EDF2', border: '1px solid #2a2e36', opacity: disabled ? 0.4 : 1 },
    danger: { background: '#7f1d1d', color: '#fca5a5', opacity: disabled ? 0.4 : 1 },
    orange: { background: '#FF6B00', color: '#fff', opacity: disabled ? 0.4 : 1 },
    ghost: { background: 'transparent', color: '#9CA3AF', opacity: disabled ? 0.4 : 1 },
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${pad} ${className}`} style={variants[variant]}>
      {children}
    </button>
  );
}

function Card({ children, className='' }) {
  return <div className={`rounded-lg p-5 ${className}`} style={{ background: '#111418', border: '1px solid #1e2229' }}>{children}</div>;
}

function Input({ label, value, onChange, placeholder, type='text', className='' }) {
  return (
    <div className={className}>
      {label && <label className="block text-xs text-muted mb-1.5">{label}</label>}
      <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        className="w-full rounded px-3 py-2 text-sm outline-none transition-colors"
        style={{ background: '#0D0D0D', border: '1px solid #1e2229', color: '#E8EDF2' }}
        onFocus={e => e.target.style.borderColor='#FFD600'}
        onBlur={e => e.target.style.borderColor='#1e2229'} />
    </div>
  );
}

function Textarea({ label, value, onChange, placeholder, rows=4, className='' }) {
  return (
    <div className={className}>
      {label && <label className="block text-xs text-muted mb-1.5">{label}</label>}
      <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows}
        className="w-full rounded px-3 py-2 text-sm outline-none transition-colors resize-none"
        style={{ background: '#0D0D0D', border: '1px solid #1e2229', color: '#E8EDF2', fontFamily: 'inherit' }}
        onFocus={e => e.target.style.borderColor='#FFD600'}
        onBlur={e => e.target.style.borderColor='#1e2229'} />

  );
}

// ─── ONBOARDING SCREEN ────────────────────────────────────────────────────────
const ONBOARDING_STEPS = [
  { q: "What's your full name?", key: 'name', placeholder: 'Dave Harris', type: 'text' },
  { q: "What's your business name?", key: 'businessName', placeholder: 'Harris Electrical Ltd', type: 'text' },
  { q: "What's your trade?", key: 'trade', placeholder: 'Electrician', type: 'text' },
  { q: "What are your main specialisms? (comma-separated)", key: 'specialisms', placeholder: 'Consumer units, EV chargers, full rewires', type: 'text' },
  { q: "What's your home postcode?", key: 'homePostcode', placeholder: 'WD23 1AA', type: 'text' },
  { q: "What's your day rate per person (£)?", key: 'dayRatePerPerson', placeholder: '350', type: 'number' },
  { q: "What target profit margin % do you aim for?", key: 'targetMarginPct', placeholder: '30', type: 'number' },
  { q: "Are you VAT registered?", key: 'vatRegistered', placeholder: '', type: 'yesno' },
];

function OnboardingScreen() {
  const { setState } = useApp();
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [val, setVal] = useState('');

  const cur = ONBOARDING_STEPS[step];
  const isLast = step === ONBOARDING_STEPS.length - 1;

  const next = () => {
    const newAnswers = { ...answers, [cur.key]: cur.type === 'number' ? +val : cur.type === 'yesno' ? val === 'yes' : val };
    setAnswers(newAnswers);
    setVal('');
    if (isLast) {
      const profile = {
        ...STUB_PROFILE,
        ...newAnswers,
        specialisms: typeof newAnswers.specialisms === 'string'
          ? newAnswers.specialisms.split(',').map(s => s.trim())
          : (newAnswers.specialisms || STUB_PROFILE.specialisms),
        onboardingComplete: true,
      };
      setState(prev => ({ ...prev, profile }));
      navigate('#/');
    } else {
      setStep(s => s + 1);
    }
  };

  const useStub = () => {
    setState(prev => ({ ...prev, profile: STUB_PROFILE }));
    navigate('#/');
  };

  return (
    <div className="flex flex-col items-center justify-center min-h-screen px-8" style={{ background: '#0D0D0D' }}>
      <div className="aq-logo text-4xl mb-10">ACCUQUOTE</div>
      <div className="w-full max-w-md">
        {/* Progress dots */}
        <div className="flex gap-2 mb-8 justify-center">
          {ONBOARDING_STEPS.map((_, i) => (
            <div key={i} className="rounded-full transition-all" style={{ width: i === step ? 24 : 8, height: 8, background: i <= step ? '#FFD600' : '#1e2229' }} />
          ))}
        </div>

        <div className="fade-up" key={step}>
          <Card>
            <div className="text-xs text-muted mb-2">Step {step + 1} of {ONBOARDING_STEPS.length}</div>
            <h2 className="text-xl font-semibold mb-6" style={{ color: '#E8EDF2' }}>{cur.q}</h2>

            {cur.type === 'yesno' ? (
              <div className="flex gap-3">
                <Btn variant={val === 'yes' ? 'primary' : 'secondary'} onClick={() => setVal('yes')} className="flex-1">Yes</Btn>
                <Btn variant={val === 'no' ? 'primary' : 'secondary'} onClick={() => setVal('no')} className="flex-1">No</Btn>
              </div>
            ) : (
              <input type={cur.type} value={val} onChange={e => setVal(e.target.value)}
                placeholder={cur.placeholder}
                className="w-full rounded px-4 py-3 text-base outline-none"
                style={{ background: '#0D0D0D', border: '1px solid #1e2229', color: '#E8EDF2', fontFamily: 'inherit' }}
                onFocus={e => e.target.style.borderColor='#FFD600'}
                onBlur={e => e.target.style.borderColor='#1e2229'}
                onKeyDown={e => e.key === 'Enter' && val && next()} />
            )}

            <div className="flex gap-3 mt-6">
              {step > 0 && <Btn variant="ghost" onClick={() => setStep(s => s-1)}>← Back</Btn>}
              <Btn onClick={next} disabled={cur.type !== 'yesno' && !val} className="flex-1">
                {isLast ? 'Finish →' : 'Next →'}
              </Btn>
            </div>
          </Card>
        </div>

        <div className="text-center mt-6">
          <button onClick={useStub} className="text-xs text-muted underline cursor-pointer bg-transparent border-0">
            Skip — use demo profile (Dave Harris)
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── SEND PROPOSAL SCREEN ────────────────────────────────────────────────────
function SendProposalScreen() {
  const { state, setState } = useApp();

  const quote = state.quote || job?.quote;
  const profile = state.profile || STUB_PROFILE;
  const [sending, setSending] = useState(false);
  const [sent, setSent] = useState(false);
  const [sendVia, setSendVia] = useState('email');

  const selectedTiers = quote?.selectedTiers || [];
  const lowestPrice = selectedTiers.length ? Math.min(...selectedTiers.map(t=>t.grandTotal||0)) : 0;
  const highestPrice = selectedTiers.length ? Math.max(...selectedTiers.map(t=>t.grandTotal||0)) : 0;
  const matTotal = (state.billOfMaterials||[]).filter(i=>!i.customerSupplied).reduce((s,i)=>s+(i.catalogueLookup?.lineTotal||0),0);

  const doSend = () => {
    setSending(true);
    setTimeout(() => {
      const proposal = {
        coverLetter: '',
        scopeBullets: [],
        jobRef: job?.id,
        proposalDate: new Date().toLocaleDateString('en-GB'),
        validUntil: new Date(Date.now()+30*24*60*60*1000).toLocaleDateString('en-GB'),
        sendVia,
        sentAt: new Date().toISOString(),
        selectedTiers,
      };
      setState(prev => ({
        ...prev, proposal,
        currentJob: { ...prev.currentJob, proposal, status: 'quoted' },
        jobs: prev.jobs.map(j => j.id === prev.currentJob?.id ? { ...j, proposal, status:'quoted' } : j),

          <p className="text-base mb-2" style={{ color:'#9CA3AF' }}>
            Sent to {job?.customer?.name || 'the customer'} via {sendVia}
          </p>
          <p className="text-sm mb-10" style={{ color:'#4B5563' }}>
            They'll receive a link to view and accept the proposal online.
          </p>
          <div className="flex flex-col gap-3">
            <button onClick={() => navigate('#/job/accepted')}
              className="w-full py-4 rounded-2xl text-base font-bold cursor-pointer border-0"
              style={{ background:'#FFD600', color:'#0D0D0D', letterSpacing:1 }}>
              View Customer Acceptance →
            </button>
            <button onClick={() => navigate('#/job/proposal')}
              className="w-full py-3 rounded-xl text-sm cursor-pointer border-0"
              style={{ background:'transparent', color:'#4B5563', border:'1px solid #1e2229' }}>
              Edit proposal details
            </button>
            <button onClick={() => navigate('#/')}
              className="w-full py-3 rounded-xl text-sm cursor-pointer border-0"
              style={{ background:'transparent', color:'#4B5563', border:'1px solid #1e2229' }}>
              Back to Dashboard
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="flex-1 flex flex-col items-center justify-center fade-up px-8" style={{ background:'#0D0D0D', minHeight:'100vh' }}>
      <div style={{ maxWidth:480, width:'100%' }}>
        <div className="text-center mb-10">
          <h1 className="text-4xl font-bold mb-3" style={{ color:'#fff', fontFamily:"'Barlow Condensed',sans-serif", letterSpacing:2 }}>SEND PROPOSAL</h1>
          <p className="text-base" style={{ color:'#6B7280' }}>to {job?.customer?.name || 'customer'}</p>
        </div>

        {/* Quote summary card */}
        <div className="rounded-2xl p-6 mb-5" style={{ background:'#111418', border:'1px solid #1e2229' }}>
          <div className="text-xs uppercase mb-4" style={{ color:'#6B7280', letterSpacing:1 }}>Proposal summary</div>
          <div className="flex items-end justify-between mb-5">
            <div>
              <div className="text-xs mb-1" style={{ color:'#4B5563' }}>
                {selectedTiers.length > 1 ? `${selectedTiers.length} options` : 'Fixed price'}
              </div>
              <div className="text-4xl font-bold" style={{ color:'#FFD600', fontFamily:"'Barlow Condensed',sans-serif" }}>
                {selectedTiers.length > 1 ? `£${lowestPrice.toLocaleString()} – £${highestPrice.toLocaleString()}` : `£${lowestPrice.toLocaleString()}`}
              </div>
              <div className="text-xs mt-1" style={{ color:'#4B5563' }}>inc VAT</div>

            <div className="text-right">

    </div>

// ─── PROPOSAL BUILDER SCREEN ─────────────────────────────────────────────────
function ProposalScreen() {
  const { state, setState } = useApp();
  const profile = state.profile || STUB_PROFILE;
  const job = state.currentJob;
  const quote = state.quote || job?.quote;
  const [generating, setGenerating] = useState(false);
  const [coverLetter, setCoverLetter] = useState(state.proposal?.coverLetter || '');
  const [scopeBullets, setScopeBullets] = useState(state.proposal?.scopeBullets || []);
  const [newBullet, setNewBullet] = useState('');
  const [sendVia, setSendVia] = useState('email');
  const [sent, setSent] = useState(false);
  const [jobRef] = useState(job?.id || `AQ-${new Date().getFullYear()}-001`);
  const proposalDate = new Date().toLocaleDateString('en-GB');
  const validUntil = new Date(Date.now()+30*24*60*60*1000).toLocaleDateString('en-GB');

  const selectedTiers = quote?.selectedTiers || [];

  const generate = async () => {
    setGenerating(true);
    try {
      const prompt = `TRADESPERSON: ${profile.name}, ${profile.businessName}, ${profile.trade}\nTONE: ${profile.toneOfVoice||'professional and warm'}\nCUSTOMER: ${job?.customer?.name||'the customer'}, ${job?.customer?.address||''}\nJOB: ${job?.jobDescription||''}\nOUT OF SCOPE: ${job?.outOfScope||'none'}\nQUOTE: £${selectedTiers[0]?.grandTotal||0} inc VAT\nSTART: ${job?.proposedStartDate||'TBC'} DURATION: ${job?.estimatedDurationDays||1} days\n\nReturn JSON only: {"coverLetter":"3-4 paragraph professional letter","scopeBullets":["item1","item2"]}`;
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{ 'x-api-key': profile.anthropicKey||'', 'anthropic-version':'2023-06-01', 'content-type':'application/json', 'anthropic-dangerous-direct-browser-access':'true' },
        body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system:'You are a professional proposal writer for UK trades businesses. Return only valid JSON.', messages:[{role:'user',content:prompt}] })
      });
      const data = await resp.json();
      const raw = data.content[0].text;
      const match = raw.match(/\{[\s\S]*\}/);
      if (match) {
        const parsed = JSON.parse(match[0]);
        setCoverLetter(parsed.coverLetter||'');
        setScopeBullets(parsed.scopeBullets||[]);
      }
    } catch(e) {
      setCoverLetter(`Dear ${job?.customer?.name||'Customer'},\n\nThank you for the opportunity to quote for the electrical works at your property. Please find enclosed our proposal for the work as discussed.\n\nWe will carry out all works to the highest standard, fully compliant with BS 7671:2018 (18th Edition Wiring Regulations). All circuits will be tested and certified upon completion.\n\nWe look forward to working with you.\n\nKind regards,\n${profile.name}\n${profile.businessName}`);
      setScopeBullets(['Strip out and dispose of existing non-compliant wiring','Install new IP65-rated accessories throughout','Install new LED lighting to ceiling','Carry out full earth bonding to all metallic services','Test and certify all works with Electrical Installation Certificate']);
    }
    setGenerating(false);
  };

  useEffect(() => { if (!coverLetter) generate(); }, []);

  const send = () => {
    const proposal = { coverLetter, scopeBullets, jobRef, proposalDate, validUntil, sendVia, sentAt: new Date().toISOString(), selectedTiers };
    setState(prev => ({ ...prev, proposal, currentJob:{...prev.currentJob, proposal, status:'quoted'}, jobs:prev.jobs.map(j=>j.id===prev.currentJob?.id?{...j,proposal,status:'quoted'}:j) }));
    setSent(true);
  };

  if (sent) {
    return (
      <Screen title="Proposal Sent">
        <div className="flex flex-col items-center justify-center py-20 text-center">
          <div className="text-6xl mb-4" style={{ color:'#22C55E' }}>✓</div>
          <div className="text-2xl font-bold mb-2" style={{ color:'#E8EDF2' }}>Proposal sent to {job?.customer?.name}</div>
          <div className="text-muted mb-8">via {sendVia}</div>
          <div className="flex gap-3">
            <Btn onClick={()=>navigate('#/job/accepted')}>View Customer Acceptance →</Btn>
            <Btn variant="secondary" onClick={()=>navigate('#/')}>Back to Dashboard</Btn>
          </div>
        </div>
      </Screen>
    );
  }

  return (
    <Screen title="Proposal Builder" subtitle="Review and send your proposal"
      action={<Btn onClick={()=>window.print()}>🖨 Print / PDF</Btn>}>
      <div className="flex gap-6" style={{ alignItems:'flex-start' }}>
        {/* Left: editable fields */}
        <div className="flex flex-col gap-5" style={{ width:320, flexShrink:0 }}>
          <Card>
            <div className="text-sm font-medium mb-3" style={{ color:'#E8EDF2' }}>Customer Details</div>
            <div className="flex flex-col gap-2 text-sm text-muted">
              <div>{job?.customer?.name}</div>
              <div>{job?.customer?.address}</div>
              <div>{job?.customer?.email}</div>
              <div>{job?.customer?.phone}</div>
            </div>
          </Card>
          <Card>
            <div className="text-sm font-medium mb-3" style={{ color:'#E8EDF2' }}>Proposal Details</div>
            <div className="flex flex-col gap-1 text-xs text-muted">
              <div>Ref: <span style={{ color:'#E8EDF2' }}>{jobRef}</span></div>
              <div>Date: <span style={{ color:'#E8EDF2' }}>{proposalDate}</span></div>
              <div>Valid until: <span style={{ color:'#E8EDF2' }}>{validUntil}</span></div>
              <div>Start: <span style={{ color:'#E8EDF2' }}>{job?.proposedStartDate||'TBC'}</span></div>
              <div>Duration: <span style={{ color:'#E8EDF2' }}>{job?.estimatedDurationDays||1} day{job?.estimatedDurationDays!==1?'s':''}</span></div>
            </div>
          </Card>
          <Card>
            <div className="flex items-center justify-between mb-3">
              <div className="text-sm font-medium" style={{ color:'#E8EDF2' }}>Cover Letter</div>
              <Btn small variant="secondary" onClick={generate} disabled={generating}>{generating?'Generating...':'Regenerate'}</Btn>
            </div>
            {generating ? (
              <div className="flex items-center gap-2 py-4 text-sm text-muted"><Spinner size={16}/> Writing...</div>
            ) : (
              <textarea value={coverLetter} onChange={e=>setCoverLetter(e.target.value)} rows={8}
                className="w-full rounded px-3 py-2 text-xs outline-none resize-none"
                style={{ background:'#0D0D0D', border:'1px solid #1e2229', color:'#9CA3AF', fontFamily:'inherit', lineHeight:1.6 }} />
            )}
          </Card>
          <Card>
            <div className="text-sm font-medium mb-3" style={{ color:'#E8EDF2' }}>Scope of Work</div>
            {scopeBullets.map((b,i) => (
              <div key={i} className="flex items-start gap-2 mb-2">
                <span style={{ color:'#FFD600', marginTop:2 }}>•</span>
                <input value={b} onChange={e=>setScopeBullets(bs=>bs.map((x,j)=>j===i?e.target.value:x))}
                  className="flex-1 text-xs rounded px-2 py-1 outline-none"
                  style={{ background:'#0D0D0D', border:'1px solid #1e2229', color:'#E8EDF2' }} />
                <button onClick={()=>setScopeBullets(bs=>bs.filter((_,j)=>j!==i))} className="cursor-pointer bg-transparent border-0 text-muted">×</button>
              </div>
            ))}
            <div className="flex gap-2 mt-2">
              <input value={newBullet} onChange={e=>setNewBullet(e.target.value)} placeholder="Add scope item..."
                className="flex-1 text-xs rounded px-2 py-1.5 outline-none"
                style={{ background:'#0D0D0D', border:'1px solid #1e2229', color:'#E8EDF2' }}
                onKeyDown={e=>{ if(e.key==='Enter'&&newBullet.trim()){setScopeBullets(b=>[...b,newBullet.trim()]);setNewBullet('');} }} />
              <Btn small onClick={()=>{ if(newBullet.trim()){setScopeBullets(b=>[...b,newBullet.trim()]);setNewBullet('');} }}>+</Btn>
            </div>
          </Card>
          <Card>
            <div className="text-sm font-medium mb-3" style={{ color:'#E8EDF2' }}>Send Via</div>
            <div className="flex gap-2">
              {['email','sms','whatsapp'].map(v=>(
                <button key={v} onClick={()=>setSendVia(v)}
                  className="flex-1 py-2 rounded text-xs cursor-pointer border-0 capitalize"
                  style={{ background:sendVia===v?'#FFD600':'#1e2229', color:sendVia===v?'#0D0D0D':'#9CA3AF', fontWeight:sendVia===v?600:400 }}>
                  {v}
                </button>
              ))}
            </div>
          </Card>
          <Btn onClick={send}>Send Proposal →</Btn>
        </div>

        {/* Right: live preview */}
        <div id="proposal-content" className="flex-1 rounded-lg overflow-hidden" style={{ border:'1px solid #1e2229', background:'#fff', color:'#111', minWidth:0 }}>
          {/* Brand header */}
          <div style={{ background: profile.brandColour||'#FFD600', padding:'20px 28px' }}>
            <div style={{ fontFamily:"'Barlow Condensed',sans-serif", fontWeight:900, fontSize:22, letterSpacing:4, color:'#0D0D0D' }}>{profile.businessName?.toUpperCase()}</div>
            <div style={{ fontSize:11, color:'rgba(0,0,0,0.6)', marginTop:4, letterSpacing:1 }}>PROPOSAL FOR ELECTRICAL WORKS</div>
          </div>
          <div style={{ padding:'24px 28px', fontFamily:"'Inter',system-ui,sans-serif", fontSize:13, lineHeight:1.7, color:'#111' }}>
            <div style={{ marginBottom:20 }}>
              <div style={{ fontWeight:600 }}>Prepared for:</div>
              <div>{job?.customer?.name}</div>
              <div>{job?.customer?.address}</div>
              <div style={{ marginTop:8, fontSize:11, color:'#666' }}>Ref: {jobRef} &nbsp;|&nbsp; Date: {proposalDate} &nbsp;|&nbsp; Valid: 30 days</div>
            </div>
            <hr style={{ border:'none', borderTop:'1px solid #e5e7eb', margin:'16px 0' }}/>

            {selectedTiers.length > 0 && (

                <div style={{ fontWeight:700, marginBottom:8, fontSize:12, letterSpacing:1 }}>INVESTMENT</div>
                {selectedTiers.length === 1 ? (

                    <div style={{ fontSize:20, fontWeight:700 }}>£{selectedTiers[0].grandTotal?.toLocaleString()} <span style={{ fontSize:12, fontWeight:400 }}>inc VAT</span></div>
                    <div style={{ fontSize:11, color:'#666', marginTop:4 }}>Deposit ({quote?.depositPct||50}%): £{selectedTiers[0].deposit?.toFixed(2)} on acceptance</div>
                    <div style={{ fontSize:11, color:'#666' }}>Balance on completion: £{(selectedTiers[0].grandTotal - (selectedTiers[0].deposit||0))?.toFixed(2)}</div>

                ) : (
                  <table style={{ width:'100%', borderCollapse:'collapse', fontSize:12 }}>

                    <tbody>{selectedTiers.map(t=><tr key={t.key} style={{ borderTop:'1px solid #e5e7eb' }}><td style={{ padding:'8px 12px' }}>Option — {t.label}</td><td style={{ padding:'8px 12px', textAlign:'right', fontWeight:700 }}>£{t.grandTotal?.toLocaleString()}</td><td style={{ padding:'8px 12px', textAlign:'right' }}>£{t.deposit?.toFixed(2)}</td></tr>)}</tbody>

            <div style={{ marginTop:16, fontSize:10, color:'#999', textAlign:'center' }}>

        </div>
      </div>

function AcceptanceScreen() {

  const job = state.currentJob;
  const quote = state.quote || job?.quote;
  const profile = state.profile || STUB_PROFILE;
  const proposal = state.proposal || job?.proposal;
  const selectedTiers = quote?.selectedTiers || proposal?.selectedTiers || [];
  const [selectedTierKey, setSelectedTierKey] = useState(selectedTiers[0]?.key||'standard');
  const [phase, setPhase] = useState('proposal'); // proposal | payment | customerConfirm | tradesConfirm
  const [payProcessing, setPayProcessing] = useState(false);
  const [cardNum, setCardNum] = useState('4242 4242 4242 4242');
  const [cardExp, setCardExp] = useState('12/28');
  const [cardCvc, setCardCvc] = useState('123');
  const [cardName, setCardName] = useState(job?.customer?.name||'');

  const chosenTier = selectedTiers.find(t=>t.key===selectedTierKey) || selectedTiers[0];

  const pay = () => {

  // Group by supplier
  const grouped = bom.filter(i=>!i.customerSupplied && i.catalogueLookup?.supplierName !== 'Self').reduce((acc,item) => {
    const sup = item.catalogueLookup?.supplierName || 'TBC';
    if (!acc[sup]) acc[sup] = { lines:[], total:0, status:'draft', delivery:'yard' };
    acc[sup].lines.push(item);
    acc[sup].total += item.catalogueLookup?.lineTotal || 0;
    return acc;
  }, {});

  const [orders, setOrders] = useState(() => Object.fromEntries(Object.entries(grouped).map(([k,v])=>[k,v])));

    setOrders(o => ({ ...o, [sup]: { ...o[sup], status:'committed' } }));

    setOrders(o => Object.fromEntries(Object.entries(o).map(([k,v])=>[k,{...v,status:'committed'}])));

      const supplierOrders = Object.entries(orders).map(([name,o])=>({ supplier:name, lines:o.lines, total:o.total, delivery:o.delivery, status:'committed', committedAt:new Date().toISOString() }));
