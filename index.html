function lookupMaterial(searchTerm, quantity, unit, preferredSuppliers, trade) {
  if (!searchTerm) return null;
  const term = searchTerm.toLowerCase();
  let best = null;
  let bestScore = 0;

  for (const item of CATALOGUE) {
    let score = 0;
    const nameLower = item.name.toLowerCase();
    if (nameLower.includes(term)) score += 10;
    for (const s of item.search) {
      if (s.includes(term)) score += 8;
      if (term.includes(s)) score += 6;
      const words = term.split(/\s+/);
      const matchedWords = words.filter(w => s.includes(w) || nameLower.includes(w));
      score += matchedWords.length * 2;
    }
    if (score > bestScore) { bestScore = score; best = item; }
  }

  if (!best || bestScore < 2) return null;

  // Pick preferred supplier
  const preferred = (preferredSuppliers || ['Screwfix']);
  let supplier = best.suppliers.find(s => preferred.includes(s.name)) || best.suppliers[0];

  const unitPrice = supplier.price;
  const lineTotal = +(unitPrice * (quantity || 1)).toFixed(2);

  return {
    catalogueId: best.id,
    materialName: best.name,
    category: best.category,
    unit: unit || best.unit,
    supplierName: supplier.name,
    supplierSku: supplier.sku,
    unitPrice,
    lineTotal,
    allSuppliers: best.suppliers,
  };
}

// ─── ROUTER (hash-based) ─────────────────────────────────────────────────────
function useHashRoute() {
  const [route, setRoute] = useState(location.hash || '#/');
  useEffect(() => {
    const handler = () => setRoute(location.hash || '#/');
    window.addEventListener('hashchange', handler);
    return () => window.removeEventListener('hashchange', handler);
  }, []);
  return route;
}

function navigate(hash) { location.hash = hash; }

// ─── PROGRESS STEPS ──────────────────────────────────────────────────────────

  { id: 'scan',      label: 'Scan',      hash: '#/job/scan' },
  { id: 'describe',  label: 'Describe',  hash: '#/job/describe' },
  { id: 'materials', label: 'Materials', hash: '#/job/materials' },
  { id: 'quote',     label: 'Quote',     hash: '#/job/quote' },
  { id: 'proposal',  label: 'Proposal',  hash: '#/job/proposal' },
  { id: 'accepted',  label: 'Accepted',  hash: '#/job/accepted' },
  { id: 'ordered',   label: 'Ordered',   hash: '#/job/orders' },
];

function stepIndexFromRoute(route) {
  if (route.includes('/job/scan')) return 0;
  if (route.includes('/job/describe')) return 1;
  if (route.includes('/job/materials')) return 2;
  if (route.includes('/job/quote')) return 3;
  if (route.includes('/job/proposal')) return 4;
  if (route.includes('/job/accepted')) return 5;
  if (route.includes('/job/orders')) return 6;
  return -1;
}

// ─── REUSABLE COMPONENTS ──────────────────────────────────────────────────────
function Btn({ children, onClick, variant='primary', disabled, className='', type='button', small }) {
  const base = 'font-medium rounded transition-all cursor-pointer border-0 flex items-center gap-2 justify-center';
  const pad = small ? 'px-3 py-1.5 text-xs' : 'px-4 py-2.5 text-sm';
  const variants = {
    primary: { background: '#FFD600', color: '#0D0D0D', opacity: disabled ? 0.4 : 1 },
    secondary: { background: '#1e2229', color: '#E8EDF2', border: '1px solid #2a2e36', opacity: disabled ? 0.4 : 1 },
    danger: { background: '#7f1d1d', color: '#fca5a5', opacity: disabled ? 0.4 : 1 },
    orange: { background: '#FF6B00', color: '#fff', opacity: disabled ? 0.4 : 1 },
    ghost: { background: 'transparent', color: '#9CA3AF', opacity: disabled ? 0.4 : 1 },
  };
  return (
    <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${pad} ${className}`} style={variants[variant]}>
      {children}
    </button>
  );
}

function Card({ children, className='' }) {
  return <div className={`rounded-lg p-5 ${className}`} style={{ background: '#111418', border: '1px solid #1e2229' }}>{children}</div>;
}

function Input({ label, value, onChange, placeholder, type='text', className='' }) {
  return (
    <div className={className}>
      {label && <label className="block text-xs text-muted mb-1.5">{label}</label>}
      <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        className="w-full rounded px-3 py-2 text-sm outline-none transition-colors"
        style={{ background: '#0D0D0D', border: '1px solid #1e2229', color: '#E8EDF2' }}
        onFocus={e => e.target.style.borderColor='#FFD600'}
        onBlur={e => e.target.style.borderColor='#1e2229'} />
    </div>
  );
}

function Textarea({ label, value, onChange, placeholder, rows=4, className='' }) {
  return (
    <div className={className}>
      {label && <label className="block text-xs text-muted mb-1.5">{label}</label>}
      <textarea value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder} rows={rows}
        className="w-full rounded px-3 py-2 text-sm outline-none transition-colors resize-none"
        style={{ background: '#0D0D0D', border: '1px solid #1e2229', color: '#E8EDF2', fontFamily: 'inherit' }}
        onFocus={e => e.target.style.borderColor='#FFD600'}
        onBlur={e => e.target.style.borderColor='#1e2229'} />
    </div>
  );
}

function Spinner({ size=20 }) {
  return (
    <svg className="spinner" width={size} height={size} viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="10" stroke="#2a2e36" strokeWidth="3"/>
      <path d="M12 2a10 10 0 0 1 10 10" stroke="#FFD600" strokeWidth="3" strokeLinecap="round"/>

}

// ─── ONBOARDING SCREEN ────────────────────────────────────────────────────────
const ONBOARDING_STEPS = [
  { q: "What's your full name?", key: 'name', placeholder: 'Dave Harris', type: 'text' },
  { q: "What's your business name?", key: 'businessName', placeholder: 'Harris Electrical Ltd', type: 'text' },
  { q: "What's your trade?", key: 'trade', placeholder: 'Electrician', type: 'text' },
  { q: "What are your main specialisms? (comma-separated)", key: 'specialisms', placeholder: 'Consumer units, EV chargers, full rewires', type: 'text' },
  { q: "What's your home postcode?", key: 'homePostcode', placeholder: 'WD23 1AA', type: 'text' },
  { q: "What's your day rate per person (£)?", key: 'dayRatePerPerson', placeholder: '350', type: 'number' },
  { q: "What target profit margin % do you aim for?", key: 'targetMarginPct', placeholder: '30', type: 'number' },
  { q: "Are you VAT registered?", key: 'vatRegistered', placeholder: '', type: 'yesno' },
];

function OnboardingScreen() {
  const { setState } = useApp();
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [val, setVal] = useState('');

  const cur = ONBOARDING_STEPS[step];
  const isLast = step === ONBOARDING_STEPS.length - 1;

  const next = () => {
    const newAnswers = { ...answers, [cur.key]: cur.type === 'number' ? +val : cur.type === 'yesno' ? val === 'yes' : val };
    setAnswers(newAnswers);
    setVal('');
    if (isLast) {
      const profile = {
        ...STUB_PROFILE,
        ...newAnswers,
        specialisms: typeof newAnswers.specialisms === 'string'
          ? newAnswers.specialisms.split(',').map(s => s.trim())
          : (newAnswers.specialisms || STUB_PROFILE.specialisms),
        onboardingComplete: true,
      };
      setState(prev => ({ ...prev, profile }));
      navigate('#/');
    } else {
      setStep(s => s + 1);
    }
  };

  const useStub = () => {
    setState(prev => ({ ...prev, profile: STUB_PROFILE }));
    navigate('#/');
  };

  return (
    <div className="flex flex-col items-center justify-center min-h-screen px-8" style={{ background: '#0D0D0D' }}>
      <div className="aq-logo text-4xl mb-10">ACCUQUOTE</div>
      <div className="w-full max-w-md">
        {/* Progress dots */}
        <div className="flex gap-2 mb-8 justify-center">
          {ONBOARDING_STEPS.map((_, i) => (
            <div key={i} className="rounded-full transition-all" style={{ width: i === step ? 24 : 8, height: 8, background: i <= step ? '#FFD600' : '#1e2229' }} />
          ))}
        </div>

        <div className="fade-up" key={step}>
          <Card>
            <div className="text-xs text-muted mb-2">Step {step + 1} of {ONBOARDING_STEPS.length}</div>
            <h2 className="text-xl font-semibold mb-6" style={{ color: '#E8EDF2' }}>{cur.q}</h2>

            {cur.type === 'yesno' ? (
              <div className="flex gap-3">
                <Btn variant={val === 'yes' ? 'primary' : 'secondary'} onClick={() => setVal('yes')} className="flex-1">Yes</Btn>
                <Btn variant={val === 'no' ? 'primary' : 'secondary'} onClick={() => setVal('no')} className="flex-1">No</Btn>
              </div>
            ) : (
              <input type={cur.type} value={val} onChange={e => setVal(e.target.value)}
                placeholder={cur.placeholder}
                className="w-full rounded px-4 py-3 text-base outline-none"
                style={{ background: '#0D0D0D', border: '1px solid #1e2229', color: '#E8EDF2', fontFamily: 'inherit' }}
                onFocus={e => e.target.style.borderColor='#FFD600'}
                onBlur={e => e.target.style.borderColor='#1e2229'}
                onKeyDown={e => e.key === 'Enter' && val && next()} />
            )}

            <div className="flex gap-3 mt-6">
              {step > 0 && <Btn variant="ghost" onClick={() => setStep(s => s-1)}>← Back</Btn>}
              <Btn onClick={next} disabled={cur.type !== 'yesno' && !val} className="flex-1">
                {isLast ? 'Finish →' : 'Next →'}
              </Btn>
            </div>
          </Card>
        </div>

        <div className="text-center mt-6">
          <button onClick={useStub} className="text-xs text-muted underline cursor-pointer bg-transparent border-0">
            Skip — use demo profile (Dave Harris)
          </button>
        </div>
      </div>
    </div>
  );
}

        </div>
      </div>
    </Screen>
  );

  if (!state.profile) return <OnboardingScreen />;

  const views = {
    '#/': <DashboardScreen />,
    '#/settings': <SettingsScreen />,
    '#/job/scan': <PlaceholderScreen title="Job Scan" next="#/job/describe" nextLabel="Next: Describe →" />,
    '#/job/describe': <PlaceholderScreen title="Job Description" next="#/job/materials" nextLabel="Next: Materials →" />,
    '#/job/materials': <PlaceholderScreen title="Materials Agent" next="#/job/quote" nextLabel="Next: Quote →" />,
    '#/job/quote': <PlaceholderScreen title="Quote Builder" next="#/job/proposal" nextLabel="Next: Proposal →" />,
    '#/job/proposal': <PlaceholderScreen title="Proposal Builder" next="#/job/accepted" nextLabel="Next: Acceptance →" />,
    '#/job/accepted': <PlaceholderScreen title="Customer Acceptance" next="#/job/orders" nextLabel="Next: Orders →" />,
    '#/job/orders': <PlaceholderScreen title="Supplier Orders" next="#/" nextLabel="Back to Dashboard" />,
  };

  const content = views[route] || views['#/'];

  return (
    <div className="flex" style={{ minHeight: '100vh' }}>
      <Sidebar route={route} />
      <main className="flex-1 flex flex-col" style={{ minWidth: 0 }}>
        {content}
      </main>
    </div>
  );
}

// ─── DEMO BUTTON ──────────────────────────────────────────────────────────────
function DemoButton() {
  const { loadDemo } = useApp();
  const [open, setOpen] = useState(false);
  return (
    <div className="no-print" style={{ position:'fixed', bottom:24, right:24, zIndex:999 }}>
      {open && (
        <div className="mb-2 rounded-lg p-3 flex flex-col gap-2 fade-up" style={{ background:'#111418', border:'1px solid #1e2229', minWidth:180 }}>
          <button onClick={() => { loadDemo(); navigate('#/'); setOpen(false); }}
            className="text-left text-sm px-3 py-2 rounded cursor-pointer border-0"
            style={{ background:'transparent', color:'#E8EDF2' }}>
            📋 Load Demo Job
          </button>
          <button onClick={() => { loadDemo(); navigate('#/job/describe'); setOpen(false); }}
            className="text-left text-sm px-3 py-2 rounded cursor-pointer border-0"
            style={{ background:'transparent', color:'#E8EDF2' }}>
            ▶ Jump to Describe
          </button>
          <button onClick={() => { loadDemo(); navigate('#/job/materials'); setOpen(false); }}
            className="text-left text-sm px-3 py-2 rounded cursor-pointer border-0"
            style={{ background:'transparent', color:'#E8EDF2' }}>
            ▶ Jump to Materials
          </button>
          <button onClick={() => { loadDemo(); navigate('#/job/quote'); setOpen(false); }}
            className="text-left text-sm px-3 py-2 rounded cursor-pointer border-0"
            style={{ background:'transparent', color:'#E8EDF2' }}>
            ▶ Jump to Quote
          </button>
        </div>
      )}
      <button onClick={() => setOpen(o => !o)}
        className="rounded-full text-xs font-bold cursor-pointer border-0 shadow-lg"
        style={{ background:'#1e2229', color:'#6B7280', width:40, height:40, display:'flex', alignItems:'center', justifyContent:'center', border:'1px solid #2a2e36' }}>
        DEMO
      </button>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  return (
    <AppProvider>
      <Router />
      <DemoButton />
    </AppProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
